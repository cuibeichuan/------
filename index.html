<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>AI Coach · 实时人体姿态检测</title>

<!-- ================== MediaPipe Pose CDN (UMD via jsdelivr) ================== -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<style>
  /* ================== 全局基础样式 ================== */
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: #0f1116;
    color: #e6e8ee;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
  }

  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  header h1 {
    margin: 0 0 4px 0;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  header p {
    margin: 0;
    font-size: 13px;
    color: #9aa3b2;
  }

  /* ================== 按钮组 ================== */
  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .btn {
    /* 移动端友好：最小 44x44 */
    min-height: 44px;
    min-width: 44px;
    padding: 10px 16px;
    border: none;
    border-radius: 10px;
    background: #2a2f3a;
    color: #e6e8ee;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
    user-select: none;
  }
  .btn:hover { background: #353c4a; }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: #3b82f6; }
  .btn.primary:hover { background: #4d8ffb; }
  .btn.success { background: #10b981; }
  .btn.success:hover { background: #20c896; }
  .btn.warning { background: #f59e0b; color: #1a1a1a; }
  .btn.warning:hover { background: #ffb12a; }
  .btn.active { outline: 2px solid #60a5fa; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .section-title {
    font-size: 13px;
    color: #9aa3b2;
    margin: 6px 0 -4px 2px;
    letter-spacing: 0.4px;
  }

  /* ================== 画布容器（保持比例，避免黑边/变形） ================== */
  .canvas-wrap {
    position: relative;
    width: 100%;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    aspect-ratio: 4 / 3; /* 默认值，运行时会按视频实际比例覆盖 */
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .canvas-wrap canvas {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
  }
  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6b7280;
    font-size: 14px;
    text-align: center;
    padding: 16px;
    pointer-events: none;
  }

  /* 状态条 */
  .status {
    font-size: 13px;
    color: #9aa3b2;
    background: #1a1d24;
    padding: 8px 12px;
    border-radius: 8px;
    min-height: 36px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #6b7280;
  }
  .dot.live { background: #ef4444; animation: blink 1s infinite; }
  .dot.ok { background: #10b981; }
  @keyframes blink { 50% { opacity: 0.3; } }

  /* 隐藏文件选择器 */
  input[type="file"].hidden-input { display: none; }
  /* 视频元素离屏（不能用 display:none，否则部分浏览器会节流/暂停播放） */
  video.hidden-input {
    position: fixed;
    left: -9999px;
    top: 0;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  /* ================== 指标面板 ================== */
  .metrics {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: stretch;
    background: #1a1d24;
    border-radius: 10px;
    padding: 12px;
  }
  .metric {
    flex: 1 1 100px;
    min-width: 100px;
    background: #242935;
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .metric-label {
    font-size: 12px;
    color: #9aa3b2;
    letter-spacing: 0.3px;
  }
  .metric-value {
    font-size: 22px;
    font-weight: 600;
    color: #e6e8ee;
    font-variant-numeric: tabular-nums;
  }

  /* ================== 报告区 ================== */
  .report {
    background: #1a1d24;
    border-left: 4px solid #3b82f6;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.7;
    color: #d8dde7;
  }
  .report h3 { margin: 0 0 8px; color: #e6e8ee; font-size: 16px; }
  .report ul { margin: 6px 0; padding-left: 22px; }
  .report .ok    { color: #10b981; font-weight: 600; }
  .report .warn  { color: #f59e0b; font-weight: 600; }
  .report .bad   { color: #ef4444; font-weight: 600; }
  .report .note  { color: #9aa3b2; font-size: 12px; margin-top: 8px; }

  /* ================== 响应式 ================== */
  @media (max-width: 600px) {
    header h1 { font-size: 18px; }
    .btn { font-size: 14px; padding: 10px 14px; }
    .app { padding: 12px; gap: 10px; }
  }
</style>
</head>

<body>
<div class="app">
  <header>
    <h1>AI Coach · 实时人体姿态检测</h1>
    <p>基于 MediaPipe Pose · 摄像头实时检测 / 视频上传分析</p>
  </header>

  <!-- 模式入口 -->
  <div class="section-title">输入源</div>
  <div class="btn-row">
    <button class="btn primary" id="btnCamera">📷 开始实时检测</button>
    <button class="btn primary" id="btnUpload">🎞️ 上传视频分析</button>
    <button class="btn" id="btnStop" disabled>⏹ 停止</button>
  </div>

  <!-- 视频播放控制（仅视频模式可用） -->
  <div class="section-title">视频控制</div>
  <div class="btn-row">
    <button class="btn success" id="btnPlay" disabled>▶ 播放</button>
    <button class="btn warning" id="btnPause" disabled>⏸ 暂停</button>
  </div>

  <!-- 运动模式选择 -->
  <div class="section-title">运动模式</div>
  <div class="btn-row">
    <button class="btn" data-sport="jumprope">🪢 跳绳</button>
    <button class="btn" data-sport="pushup">💪 俯卧撑</button>
    <button class="btn" data-sport="squat">🏋️ 深蹲</button>
  </div>

  <!-- 画布显示区 -->
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="output"></canvas>
    <div class="placeholder" id="placeholder">点击上方按钮开启摄像头或上传视频</div>
  </div>

  <!-- 规则引擎指标面板（根据当前运动模式动态展示） -->
  <div class="metrics" id="metrics">
    <div class="metric">
      <div class="metric-label">当前运动</div>
      <div class="metric-value" id="mSport">—</div>
    </div>
    <div class="metric">
      <div class="metric-label" id="mCountLabel">计数</div>
      <div class="metric-value" id="mCount">0</div>
    </div>
    <div class="metric">
      <div class="metric-label" id="mFsmStateLabel">状态</div>
      <div class="metric-value" id="mFsmState">—</div>
    </div>
    <div class="metric">
      <div class="metric-label" id="mKneeLLabel">左膝角度</div>
      <div class="metric-value" id="mKneeL">—</div>
    </div>
    <div class="metric">
      <div class="metric-label" id="mKneeRLabel">右膝角度</div>
      <div class="metric-value" id="mKneeR">—</div>
    </div>
    <div class="metric">
      <div class="metric-label" id="mLeanLabel">躯干倾角</div>
      <div class="metric-value" id="mLean">—</div>
    </div>
  </div>

  <!-- 报告操作 -->
  <div class="btn-row">
    <button class="btn" id="btnResetCount">🔄 重置计数</button>
    <button class="btn primary" id="btnReport">📋 结束并生成报告</button>
    <label class="btn" style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;">
      <input type="checkbox" id="chkVoice" checked style="margin:0;"> 语音提醒
    </label>
    <button class="btn" id="btnVoiceTest">🔊 测试语音</button>
  </div>
  <div id="voiceHint" style="font-size:12px;color:#9aa3b2;padding:4px 2px;line-height:1.5;">
    📱 手机端如无声音：① 关闭 iPhone 侧边<b>静音开关</b>（橙色条）；
    ② 按音量<b>+键</b>并确认屏幕显示"<b>铃声</b>"或"<b>媒体</b>"音量不为 0；
    ③ 微信/QQ 等内置浏览器不支持语音，请用系统 Safari / Chrome 打开。
    先点一下 <b>🔊 测试语音</b>，听到即表示正常。
  </div>

  <!-- 报告区（生成后显示） -->
  <div class="report" id="report" style="display:none;"></div>

  <!-- 状态显示 -->
  <div class="status" id="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">空闲</span>
  </div>

  <!-- 隐藏的输入元素 -->
  <input type="file" id="fileInput" class="hidden-input" accept="video/*" />
  <video id="videoEl" class="hidden-input" playsinline muted></video>
</div>

<script>
/* ============================================================
 *  顶部配置项（方便修改）
 * ============================================================ */
const CONFIG = {
  // 关键点颜色（圆圈）
  KEYPOINT_COLOR: '#00E5FF',
  KEYPOINT_RADIUS: 4,

  // 连线颜色与粗细
  CONNECTION_COLOR: '#FF4081',
  CONNECTION_WIDTH: 3,

  // 检测阈值（可见度低于此值不绘制）
  VISIBILITY_THRESHOLD: 0.5,

  // 摄像头分辨率限制（性能优化）
  CAMERA_WIDTH: 640,
  CAMERA_HEIGHT: 480,

  // 帧率上限（fps），避免过度推理
  TARGET_FPS: 30,

  // MediaPipe Pose 选项
  POSE_OPTIONS: {
    modelComplexity: 1,         // 0/1/2，越高越精准但越慢
    smoothLandmarks: true,
    enableSegmentation: false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
  },

  // ============ 规则引擎 · 跳绳 ============
  JUMPROPE: {
    BASELINE_WINDOW_MS: 2000,   // 基线观察窗口：最近 2 秒双踝 y 的最大值作为"地面"基线
    RISE_THRESHOLD: 0.03,       // 归一化 y 方向：离开基线 > 3% 画面高度 → 视为起跳
    FALL_THRESHOLD: 0.015,      // 回到基线下方 1.5% 以内 → 视为落地（滞回区间）
    MIN_AIR_TIME_MS: 80,        // 最短腾空时间，防抖
    MIN_CYCLE_MS: 200,          // 单次完整跳的最小周期（对应 ~300 次/分钟上限）
    MIN_VISIBILITY: 0.5,        // 踝关键点可见度门槛
    // ---- 活跃跳绳判定（用于过滤准备/结束阶段的零散动作）----
    MIN_WARMUP_JUMPS: 2,        // 至少累计这么多跳后，才认为"已进入跳绳"
    ACTIVE_INTERVAL_MS: 1500,   // 相邻两跳间隔 > 该值则视为"已退出跳绳/在休息"
  },
  // ============ 规则引擎 · 俯卧撑 · 肘关节角度（计数 + 深度 + 锁死评估）============
  PUSHUP_ELBOW: {
    UP_THRESHOLD: 150,         // 双肘均值 > 该值 → 进入 UP 态
    DOWN_THRESHOLD: 100,       // 双肘均值 < 该值 → 进入 DOWN 态（滞回区间）
    DEPTH_STANDARD: 90,        // 本 rep 最小肘角 ≤ 该值 视为下沉到位
    DEPTH_SHALLOW: 110,        // 本 rep 最小肘角 > 该值 视为深度不足
    LOCKOUT_THRESHOLD: 175,    // 本 rep 最大肘角 > 该值 视为肘锁死
    MIN_REP_MS: 600,           // 单次 rep 最小周期（防抖）
    LM_MIN_VISIBILITY: 0.4,
  },
  // ============ 规则引擎 · 俯卧撑 · 躯干笔直度 ============
  PUSHUP_BODYLINE: {
    BODY_MIN: 165,             // 肩-髋-踝标准下限（侧面 ≈ 180°）
    NECK_MIN: 160,             // 耳-肩-髋标准下限（颈部与躯干同轴）
    LM_MIN_VISIBILITY: 0.4,
    SAMPLE_INTERVAL_MS: 200,   // 报告采样间隔
    BAD_FRAMES_FOR_VOICE: 8,   // 连续偏离这么多帧（≈ 8 × 33ms ≈ 0.27s）触发语音
  },
  // ============ 实时语音提醒 ============
  VOICE: {
    ENABLED: true,           // 总开关，可被 UI 切换
    COOLDOWN_MS: 4000,       // 同一类提醒的最小间隔（防止每跳都念）
    LANG: 'zh-CN',
    RATE: 1.05,              // 语速
    PITCH: 1.0,
    VOLUME: 1.0,
  },
  // ============ 规则引擎 · 跳绳 · 躯干姿态（核心稳定与重心控制评估）============
  POSTURE: {
    STANDARD_MIN: 5,             // 标准下限（含）：轻微前倾
    STANDARD_MAX: 15,            // 标准上限（含）
    // < STANDARD_MIN → tooUpright（过于挺直/后仰，重心偏后）
    // > STANDARD_MAX → overLean  （躯干倾斜过大，核心失控）
    LM_MIN_VISIBILITY: 0.4,
    SMOOTH_WINDOW: 5,            // 落地瞬间用最近 N 帧均值，降低瞬时抖动
  },
  // ============ 规则引擎 · 跳绳 · 膝关节角度（落地缓冲评估）============
  KNEE: {
    STANDARD_MIN: 140,           // 标准下限（含）
    STANDARD_MAX: 160,           // 标准上限（含）
    // < STANDARD_MIN  → 屈曲过大（over flexion）
    // > STANDARD_MAX  → 过伸（over extension）
    LM_MIN_VISIBILITY: 0.4,      // 髋/膝/踝可见度门槛
    LABEL_COLOR: '#FFEB3B',      // 画面文字颜色
    LABEL_STROKE: 'rgba(0,0,0,0.75)',
    LABEL_FONT: 'bold 16px monospace',
  },
};

/* ============================================================
 *  DOM 引用
 * ============================================================ */
const canvas       = document.getElementById('output');
const ctx          = canvas.getContext('2d');
const canvasWrap   = document.getElementById('canvasWrap');
const placeholder  = document.getElementById('placeholder');
const statusText   = document.getElementById('statusText');
const statusDot    = document.getElementById('statusDot');

const btnCamera = document.getElementById('btnCamera');
const btnUpload = document.getElementById('btnUpload');
const btnStop   = document.getElementById('btnStop');
const btnPlay   = document.getElementById('btnPlay');
const btnPause  = document.getElementById('btnPause');

const fileInput = document.getElementById('fileInput');
const videoEl   = document.getElementById('videoEl');

/* ============================================================
 *  全局状态
 * ============================================================ */
let pose = null;            // MediaPipe Pose 实例
let mode = 'idle';          // 'idle' | 'camera' | 'video'
let cameraStream = null;    // getUserMedia 返回的流
let videoRafId = null;      // 视频模式渲染 rAF id
let inferTimerId = null;    // 视频模式推理定时器
let inferring = false;      // 推理是否进行中（防重入）
let lastLandmarks = null;        // 最近一次姿态结果（屏幕坐标，用于绘制 / 落地基线判断）
let lastWorldLandmarks = null;   // 最近一次 3D 世界坐标（米单位，用于角度计算）
let lastFrameTime = 0;      // 摄像头模式帧率限制
const MIN_FRAME_INTERVAL = 1000 / CONFIG.TARGET_FPS;

/* ============================================================
 *  辅助：状态显示与占位
 * ============================================================ */
function setStatus(text, type = 'idle') {
  statusText.textContent = text;
  statusDot.className = 'dot' + (type === 'live' ? ' live' : type === 'ok' ? ' ok' : '');
}
function showPlaceholder(show) {
  placeholder.style.display = show ? 'flex' : 'none';
}

/* ============================================================
 *  画布尺寸适配（保持原始比例）
 * ============================================================ */
function fitCanvasTo(width, height) {
  canvas.width = width;
  canvas.height = height;
  // 容器跟随视频比例，避免黑边/变形
  canvasWrap.style.aspectRatio = `${width} / ${height}`;
}

/* ============================================================
 *  MediaPipe Pose 初始化
 *  注：Pose 内部使用 WebGL/WASM；这里通过设置 GL context preferences
 *  以及不启用 segmentation 来确保走 WebGL 后端，性能最优
 * ============================================================ */
function initPose() {
  if (pose) return pose;

  pose = new Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`,
  });

  pose.setOptions(CONFIG.POSE_OPTIONS);
  pose.onResults(onPoseResults);
  return pose;
}

/* ============================================================
 *  推理结果回调：绘制图像 + 骨架
 * ============================================================ */
function onPoseResults(results) {
  // 两种模式统一：只缓存关键点，渲染循环负责画面与骨架叠加
  lastLandmarks = results.poseLandmarks || null;
  lastWorldLandmarks = results.poseWorldLandmarks || null;
  // 驱动规则引擎（状态机）
  ruleEngine.update(lastLandmarks, performance.now(), lastWorldLandmarks);
  refreshMetricsUI();
}

/* ============================================================
 *  骨架绘制（关键点圆圈 + 连线）
 * ============================================================ */
function drawSkeleton(landmarks) {
  const w = canvas.width;
  const h = canvas.height;

  // 优先使用 MediaPipe drawing_utils（视觉效果一致）
  if (typeof drawConnectors === 'function' && typeof drawLandmarks === 'function'
      && typeof POSE_CONNECTIONS !== 'undefined') {
    drawConnectors(ctx, landmarks, POSE_CONNECTIONS, {
      color: CONFIG.CONNECTION_COLOR,
      lineWidth: CONFIG.CONNECTION_WIDTH,
    });
    drawLandmarks(ctx, landmarks, {
      color: CONFIG.KEYPOINT_COLOR,
      lineWidth: 1,
      radius: CONFIG.KEYPOINT_RADIUS,
      fillColor: CONFIG.KEYPOINT_COLOR,
    });
    return;
  }

  // 兜底：手动绘制
  ctx.strokeStyle = CONFIG.CONNECTION_COLOR;
  ctx.lineWidth = CONFIG.CONNECTION_WIDTH;
  const connections = (typeof POSE_CONNECTIONS !== 'undefined') ? POSE_CONNECTIONS : [];
  for (const [a, b] of connections) {
    const la = landmarks[a], lb = landmarks[b];
    if (!la || !lb) continue;
    if ((la.visibility ?? 1) < CONFIG.VISIBILITY_THRESHOLD) continue;
    if ((lb.visibility ?? 1) < CONFIG.VISIBILITY_THRESHOLD) continue;
    ctx.beginPath();
    ctx.moveTo(la.x * w, la.y * h);
    ctx.lineTo(lb.x * w, lb.y * h);
    ctx.stroke();
  }
  ctx.fillStyle = CONFIG.KEYPOINT_COLOR;
  for (const lm of landmarks) {
    if ((lm.visibility ?? 1) < CONFIG.VISIBILITY_THRESHOLD) continue;
    ctx.beginPath();
    ctx.arc(lm.x * w, lm.y * h, CONFIG.KEYPOINT_RADIUS, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* ============================================================
 *  规则引擎（有限状态机 FSM）
 * ============================================================
 *  架构：
 *    RuleEngine      —— 管理当前运动模式下的所有规则实例
 *    FSMRule         —— 规则基类，封装状态、转移、元数据
 *    JumpRopeCounter —— 跳绳计数规则（第 1 个）
 *
 *  每一帧推理得到 landmarks 后，调用 engine.update(landmarks, ts)，
 *  引擎分发给当前运动的每条规则；规则内部驱动状态机转移并更新指标。
 *
 *  后续可在此框架上扩展剩余 3 个跳绳规则（节奏、姿态质量、节奏稳定性等）。
 * ============================================================ */

// MediaPipe Pose Landmark 索引（节选常用）
const LM = {
  NOSE: 0,
  LEFT_EAR: 7,       RIGHT_EAR: 8,
  LEFT_SHOULDER: 11, RIGHT_SHOULDER: 12,
  LEFT_ELBOW: 13,    RIGHT_ELBOW: 14,
  LEFT_WRIST: 15,    RIGHT_WRIST: 16,
  LEFT_HIP: 23,      RIGHT_HIP: 24,
  LEFT_KNEE: 25,     RIGHT_KNEE: 26,
  LEFT_ANKLE: 27,    RIGHT_ANKLE: 28,
};

/* ---------- 语音提醒（Web Speech API） ----------
 * 移动端（尤其 iOS Safari）特殊处理：
 *  1. 必须在用户手势的同步调用栈里首次 speak，引擎才会被解锁
 *  2. SpeechSynthesisUtterance 必须保留引用，否则被 GC 后无声
 *  3. iOS 切后台后 engine 会 paused，每次 speak 前调 resume()
 */
const _voiceCooldown = new Map();
const _utterPool = [];           // 保留 utterance 引用，防 iOS GC 无声
let _voiceUnlocked = false;

function _ttsAvailable() {
  return typeof window !== 'undefined' && 'speechSynthesis' in window;
}

/** 在用户手势中调用一次 speak，解锁移动端 TTS
 *  注意：iOS 要求此次调用 volume > 0 才算真正解锁，否则后续异步 speak 仍无声
 */
function unlockVoice() {
  if (_voiceUnlocked || !_ttsAvailable()) return;
  try {
    // 用极短的"."作为解锁内容，不易干扰；若要完全静默改用 volume=0 可能无效
    const u = new SpeechSynthesisUtterance('.');
    u.lang = CONFIG.VOICE.LANG;
    u.rate = 1.5;
    u.volume = CONFIG.VOICE.VOLUME;
    window.speechSynthesis.speak(u);
    _utterPool.push(u);
    _voiceUnlocked = true;
  } catch (e) { /* ignore */ }
}

/** 全局监听首次用户手势进行解锁（pointerdown 兼容鼠标 + 触摸 + 笔） */
(function armVoiceUnlock() {
  if (!_ttsAvailable()) return;
  const handler = () => {
    unlockVoice();
    window.removeEventListener('pointerdown', handler, true);
    window.removeEventListener('touchstart',  handler, true);
    window.removeEventListener('keydown',     handler, true);
  };
  window.addEventListener('pointerdown', handler, true);
  window.addEventListener('touchstart',  handler, true);
  window.addEventListener('keydown',     handler, true);
})();

function speak(text, key = text) {
  if (!CONFIG.VOICE.ENABLED || !_ttsAvailable()) return;
  const now = performance.now();
  const last = _voiceCooldown.get(key) || 0;
  if (now - last < CONFIG.VOICE.COOLDOWN_MS) return;
  _voiceCooldown.set(key, now);
  try {
    // iOS 切后台 / 锁屏后 engine 可能 paused，先恢复
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();
    const u = new SpeechSynthesisUtterance(text);
    u.lang   = CONFIG.VOICE.LANG;
    u.rate   = CONFIG.VOICE.RATE;
    u.pitch  = CONFIG.VOICE.PITCH;
    u.volume = CONFIG.VOICE.VOLUME;
    window.speechSynthesis.speak(u);
    // 保留引用（最多 8 条，FIFO），避免被 GC 导致无声
    _utterPool.push(u);
    if (_utterPool.length > 8) _utterPool.shift();
  } catch (e) { console.warn('speak error', e); }
}

function resetVoiceCooldown() { _voiceCooldown.clear(); }

/** 有限状态机规则基类 */
class FSMRule {
  constructor(name, initialState = 'INIT') {
    this.name = name;
    this.state = initialState;
    this.prevState = null;
    this.metrics = {};       // 规则对外暴露的指标（如 count、bpm 等）
    this.lastTransitionTs = 0;
    this.engine = null;      // 由 RuleEngine.register 回填
  }
  /** 状态转移；子类调用 */
  transition(next, ts) {
    if (next === this.state) return false;
    this.prevState = this.state;
    this.state = next;
    this.lastTransitionTs = ts;
    return true;
  }
  /** 向同 sport 下其他规则广播事件 */
  emit(eventName, payload) {
    if (this.engine) this.engine.emit(this, eventName, payload);
  }
  /** 接收其他规则事件；子类按需重写 */
  onEvent(_eventName, _payload, _from) { /* override */ }
  /** 规则主循环；子类实现 */
  update(_landmarks, _ts) { /* override */ }
  /** 重置 */
  reset() {
    this.state = 'INIT';
    this.prevState = null;
    this.metrics = {};
    this.lastTransitionTs = 0;
  }
}

/**
 * 三点夹角（顶点为 b），返回度数 [0, 180]。
 * 优先使用 3D 坐标（MediaPipe Pose 的 z 值），以避免侧面拍摄时
 * 2D 投影使屈膝看上去接近 180° 的失真问题。
 * 若 landmark 缺少 z（如未来兼容 2D 来源），自动回退到 2D 计算。
 */
function angleDeg(a, b, c) {
  const az = a.z ?? 0, bz = b.z ?? 0, cz = c.z ?? 0;
  const v1x = a.x - b.x, v1y = a.y - b.y, v1z = az - bz;
  const v2x = c.x - b.x, v2y = c.y - b.y, v2z = cz - bz;
  const dot = v1x * v2x + v1y * v2y + v1z * v2z;
  const m1  = Math.hypot(v1x, v1y, v1z);
  const m2  = Math.hypot(v2x, v2y, v2z);
  if (m1 === 0 || m2 === 0) return NaN;
  let cos = dot / (m1 * m2);
  cos = Math.max(-1, Math.min(1, cos));
  return Math.acos(cos) * 180 / Math.PI;
}

/**
 * 跳绳计数规则
 *
 * 状态机：
 *   INIT ──(基线建立)──▶ GROUND
 *   GROUND ──(ankleY 上升超过阈值, 持续 >= MIN_AIR_TIME_MS)──▶ AIR
 *   AIR    ──(ankleY 回落到基线附近, 周期 >= MIN_CYCLE_MS)──▶ GROUND (count++)
 *
 * 信号：双踝 y 坐标均值；y 向下为正，越小代表越高。
 * 基线：最近 BASELINE_WINDOW_MS 窗口内 y 的最大值（最低位置 = 地面）。
 * 滞回：起跳阈值 RISE_THRESHOLD 大于落地阈值 FALL_THRESHOLD，防抖动误计。
 */
class JumpRopeCounter extends FSMRule {
  constructor(cfg) {
    super('jumprope_count', 'INIT');
    this.cfg = cfg;
    this.samples = [];       // [{ y, ts }]  y 基线观察窗口
    this.metrics = this._emptyMetrics();
    this.airEnterTs = 0;     // 进入 AIR 的时间戳
    this.lastCountTs = 0;    // 上次计数时间戳（用于 MIN_CYCLE_MS）
  }

  _emptyMetrics() {
    return {
      count: 0,
      state: 'INIT',
      isActive: false,        // 是否处于"已进入跳绳节奏"
      lastIntervalMs: null,   // 上一次跳跃间隔（ms）
    };
  }

  reset() {
    super.reset();
    this.samples = [];
    this.metrics = this._emptyMetrics();
    this.airEnterTs = 0;
    this.lastCountTs = 0;
  }

  update(landmarks, ts) {
    // 闲置过久 → 退出活跃状态（"准备/结束阶段"自动屏蔽）
    if (this.metrics.isActive && this.lastCountTs > 0 &&
        ts - this.lastCountTs > this.cfg.ACTIVE_INTERVAL_MS) {
      this.metrics.isActive = false;
    }

    if (!landmarks) { this.metrics.state = this.state; return; }
    const la = landmarks[LM.LEFT_ANKLE];
    const ra = landmarks[LM.RIGHT_ANKLE];
    if (!la || !ra) { this.metrics.state = this.state; return; }
    if ((la.visibility ?? 0) < this.cfg.MIN_VISIBILITY ||
        (ra.visibility ?? 0) < this.cfg.MIN_VISIBILITY) {
      this.metrics.state = this.state;
      return;
    }

    // 信号：双踝 y 均值（归一化 0~1）
    const ankleY = (la.y + ra.y) / 2;

    // 维护基线观察窗口（滚动丢弃过期样本）
    this.samples.push({ y: ankleY, ts });
    const cutoff = ts - this.cfg.BASELINE_WINDOW_MS;
    while (this.samples.length && this.samples[0].ts < cutoff) {
      this.samples.shift();
    }
    // 基线 = 窗口内 y 最大值（脚最低 = 地面）
    let baseline = ankleY;
    for (const s of this.samples) if (s.y > baseline) baseline = s.y;

    // 窗口样本不足时先建立基线
    if (this.state === 'INIT') {
      if (this.samples.length >= 5) this.transition('GROUND', ts);
      this.metrics.state = this.state;
      return;
    }

    // 相对基线的偏移量：正值表示高于基线（脚抬起来了）
    const liftAmount = baseline - ankleY;

    // 状态机驱动
    if (this.state === 'GROUND') {
      if (liftAmount > this.cfg.RISE_THRESHOLD) {
        this.transition('AIR', ts);
        this.airEnterTs = ts;
      }
    } else if (this.state === 'AIR') {
      const airDuration = ts - this.airEnterTs;
      if (liftAmount < this.cfg.FALL_THRESHOLD &&
          airDuration >= this.cfg.MIN_AIR_TIME_MS) {
        // 落地 → 计数一次（需满足最小周期）
        let counted = false;
        let interval = null;
        if (ts - this.lastCountTs >= this.cfg.MIN_CYCLE_MS) {
          interval = this.lastCountTs > 0 ? ts - this.lastCountTs : null;
          this.metrics.count++;
          this.lastCountTs = ts;
          this.metrics.lastIntervalMs = interval;
          counted = true;

          // 活跃判定：累计跳数 ≥ MIN_WARMUP_JUMPS 且与上一跳间隔 ≤ ACTIVE_INTERVAL_MS
          this.metrics.isActive =
            this.metrics.count >= this.cfg.MIN_WARMUP_JUMPS &&
            interval != null && interval <= this.cfg.ACTIVE_INTERVAL_MS;
        }
        this.transition('GROUND', ts);
        // 广播落地事件，携带活跃状态供其他规则过滤
        if (counted) this.emit('land', {
          ts,
          interval,
          isActive: this.metrics.isActive,
        });
      }
    }

    this.metrics.state = this.state;
  }
}

/** 规则引擎：按运动模式分发 + 规则间事件总线 */
class RuleEngine {
  constructor() {
    this.sport = null;
    this.rules = new Map();  // sport → FSMRule[]
  }
  register(sport, rule) {
    rule.engine = this;
    if (!this.rules.has(sport)) this.rules.set(sport, []);
    this.rules.get(sport).push(rule);
  }
  setSport(sport) {
    this.sport = sport;
    this.resetCurrent();
  }
  resetCurrent() {
    const list = this.rules.get(this.sport);
    if (list) list.forEach(r => r.reset());
  }
  update(landmarks, ts, worldLandmarks) {
    if (!this.sport) return;
    const list = this.rules.get(this.sport);
    if (!list) return;
    for (const r of list) r.update(landmarks, ts, worldLandmarks);
  }
  /** 事件分发：from 规则向同 sport 下其他规则广播 */
  emit(from, eventName, payload) {
    const list = this.rules.get(this.sport);
    if (!list) return;
    for (const r of list) {
      if (r !== from) r.onEvent(eventName, payload, from);
    }
  }
  /** 返回某规则的 metrics */
  getMetrics(ruleName) {
    const r = this.getRule(ruleName);
    return r ? r.metrics : null;
  }
  getRule(ruleName) {
    if (!this.sport) return null;
    const list = this.rules.get(this.sport);
    if (!list) return null;
    return list.find(r => r.name === ruleName) || null;
  }
}

/**
 * 跳绳膝关节角度规则（落地缓冲评估）
 *
 * 设计：
 *  - 实时：每帧用 髋-膝-踝 三点夹角计算左/右膝伸展角度，写入 metrics.currentL/R/Avg
 *  - 落地采样：订阅 JumpRopeCounter 的 'land' 事件，记录该瞬间膝角并分类
 *
 * 分类阈值（运动科学参考）：
 *  - 标准：140° ≤ angle ≤ 160°
 *      落地时膝关节适度屈曲，能借助股四头肌、臀大肌的离心收缩有效吸收冲击
 *  - 屈曲过大：angle < 140°
 *      膑股关节压强升高，长期与髌股疼痛综合征 (PFPS)、髌腱炎相关
 *  - 过伸：angle > 160°
 *      缓冲不足，地面反作用力沿胫骨向上传导，与胫骨骨膜炎、半月板冲击伤、
 *      应力性骨折等损伤风险相关
 */
class JumpRopeKneeAngle extends FSMRule {
  constructor(cfg) {
    super('jumprope_knee', 'IDLE');
    this.cfg = cfg;
    this.metrics = this._emptyMetrics();
  }
  _emptyMetrics() {
    return {
      currentL: null,
      currentR: null,
      currentAvg: null,
      samples: [],   // 每次落地一条 { ts, angle, side, category }
      counts: { standard: 0, overFlexion: 0, overExtension: 0 },
    };
  }
  reset() {
    super.reset();
    this.metrics = this._emptyMetrics();
  }

  update(landmarks, _ts, worldLandmarks) {
    if (!landmarks) {
      this.metrics.currentL = this.metrics.currentR = this.metrics.currentAvg = null;
      return;
    }
    const minV = this.cfg.LM_MIN_VISIBILITY;
    // 屏幕坐标用于可见度筛选与回退角度计算
    const lh = landmarks[LM.LEFT_HIP],  lk = landmarks[LM.LEFT_KNEE],  la = landmarks[LM.LEFT_ANKLE];
    const rh = landmarks[LM.RIGHT_HIP], rk = landmarks[LM.RIGHT_KNEE], ra = landmarks[LM.RIGHT_ANKLE];
    const lOk = lh && lk && la &&
      (lh.visibility ?? 0) >= minV && (lk.visibility ?? 0) >= minV && (la.visibility ?? 0) >= minV;
    const rOk = rh && rk && ra &&
      (rh.visibility ?? 0) >= minV && (rk.visibility ?? 0) >= minV && (ra.visibility ?? 0) >= minV;

    // 角度计算：优先 3D 世界坐标（米单位，对侧面拍摄更稳健）
    const W = worldLandmarks || landmarks;
    const wlh = W[LM.LEFT_HIP],  wlk = W[LM.LEFT_KNEE],  wla = W[LM.LEFT_ANKLE];
    const wrh = W[LM.RIGHT_HIP], wrk = W[LM.RIGHT_KNEE], wra = W[LM.RIGHT_ANKLE];

    this.metrics.currentL = (lOk && wlh && wlk && wla) ? angleDeg(wlh, wlk, wla) : null;
    this.metrics.currentR = (rOk && wrh && wrk && wra) ? angleDeg(wrh, wrk, wra) : null;
    if (this.metrics.currentL != null && this.metrics.currentR != null) {
      this.metrics.currentAvg = (this.metrics.currentL + this.metrics.currentR) / 2;
    } else {
      this.metrics.currentAvg = this.metrics.currentL ?? this.metrics.currentR;
    }
  }

  onEvent(name, payload) {
    if (name !== 'land') return;
    // 仅在"已进入跳绳节奏"时记录，过滤准备/结束阶段的零散动作
    if (!payload || !payload.isActive) return;
    const angle = this.metrics.currentAvg;
    if (angle == null || isNaN(angle)) return;
    let category;
    if (angle < this.cfg.STANDARD_MIN)      category = 'overFlexion';
    else if (angle > this.cfg.STANDARD_MAX) category = 'overExtension';
    else                                    category = 'standard';
    this.metrics.counts[category]++;
    this.metrics.samples.push({
      ts: payload.ts,
      angle,
      angleL: this.metrics.currentL,
      angleR: this.metrics.currentR,
      category,
    });
    // 语音提醒
    if (category === 'overExtension') speak('膝盖超伸，注意弯曲', 'knee_overExt');
    else if (category === 'overFlexion') speak('膝盖弯曲，减少角度', 'knee_overFlex');
  }
}

/**
 * 跳绳躯干姿态规则（核心稳定 / 重心控制评估）
 *
 * 设计：
 *  - 实时：每帧用 髋中点→肩中点 向量与竖直方向的夹角作为"躯干倾角"
 *          优先使用 worldLandmarks（3D，米单位）以摆脱拍摄视角影响
 *  - 落地采样：订阅 'land' 事件并仅在 isActive 期记录，与膝角口径一致
 *  - 平滑：用最近 SMOOTH_WINDOW 帧的均值，避免瞬时抖动
 *
 * 分类阈值（运动科学参考）：
 *  - 标准：5° ≤ lean ≤ 15°
 *      正常跳绳应保持轻微前倾，重心位于足前掌，便于踝-膝-髋链协同缓冲
 *  - 过于挺直 / 后仰：lean < 5°
 *      重心后移，落地多以脚跟先触地，缓冲不足，膝前侧与髌腱负担加重；
 *      与跟痛症、跖筋膜炎、髌腱炎风险相关
 *  - 过度倾斜：lean > 15°
 *      核心稳定性不足；腰椎承受过多剪切力，长期与下腰痛、腹肌-臀部协同
 *      力量不足关联；同时影响呼吸节奏与跳跃节律
 */
class JumpRopePosture extends FSMRule {
  constructor(cfg) {
    super('jumprope_posture', 'IDLE');
    this.cfg = cfg;
    this.recent = []; // 最近 N 帧倾角，用于平滑
    this.metrics = this._emptyMetrics();
  }
  _emptyMetrics() {
    return {
      currentLean: null,            // 实时倾角（度）
      samples: [],                  // 每次有效落地一条 { ts, lean, category }
      counts: { standard: 0, tooUpright: 0, overLean: 0 },
    };
  }
  reset() {
    super.reset();
    this.recent = [];
    this.metrics = this._emptyMetrics();
  }

  update(landmarks, _ts, worldLandmarks) {
    if (!landmarks) { this.metrics.currentLean = null; return; }
    const minV = this.cfg.LM_MIN_VISIBILITY;
    const ls = landmarks[LM.LEFT_SHOULDER], rs = landmarks[LM.RIGHT_SHOULDER];
    const lh = landmarks[LM.LEFT_HIP],      rh = landmarks[LM.RIGHT_HIP];
    const ok = ls && rs && lh && rh &&
      (ls.visibility ?? 0) >= minV && (rs.visibility ?? 0) >= minV &&
      (lh.visibility ?? 0) >= minV && (rh.visibility ?? 0) >= minV;
    if (!ok) { this.metrics.currentLean = null; return; }

    // 优先用 3D 世界坐标
    const W = worldLandmarks || landmarks;
    const wls = W[LM.LEFT_SHOULDER], wrs = W[LM.RIGHT_SHOULDER];
    const wlh = W[LM.LEFT_HIP],      wrh = W[LM.RIGHT_HIP];
    if (!wls || !wrs || !wlh || !wrh) { this.metrics.currentLean = null; return; }

    const sx = (wls.x + wrs.x) / 2;
    const sy = (wls.y + wrs.y) / 2;
    const sz = ((wls.z ?? 0) + (wrs.z ?? 0)) / 2;
    const hx = (wlh.x + wrh.x) / 2;
    const hy = (wlh.y + wrh.y) / 2;
    const hz = ((wlh.z ?? 0) + (wrh.z ?? 0)) / 2;
    // 躯干向量 = 肩中点 - 髋中点
    const vx = sx - hx, vy = sy - hy, vz = sz - hz;
    const mag = Math.hypot(vx, vy, vz);
    if (mag === 0) { this.metrics.currentLean = null; return; }
    // 与竖直向上方向 (0, -1, 0) 的夹角（y 向下为正，所以 up = (0,-1,0)）
    let cos = -vy / mag;
    cos = Math.max(-1, Math.min(1, cos));
    const lean = Math.acos(cos) * 180 / Math.PI;

    // 平滑窗口
    this.recent.push(lean);
    if (this.recent.length > this.cfg.SMOOTH_WINDOW) this.recent.shift();
    const smoothed = this.recent.reduce((s, x) => s + x, 0) / this.recent.length;

    this.metrics.currentLean = smoothed;
  }

  onEvent(name, payload) {
    if (name !== 'land') return;
    if (!payload || !payload.isActive) return;
    const lean = this.metrics.currentLean;
    if (lean == null || isNaN(lean)) return;
    let category;
    if (lean < this.cfg.STANDARD_MIN)      category = 'tooUpright';
    else if (lean > this.cfg.STANDARD_MAX) category = 'overLean';
    else                                   category = 'standard';
    this.metrics.counts[category]++;
    this.metrics.samples.push({ ts: payload.ts, lean, category });
    // 语音提醒（两种偏离共用同一句）
    if (category !== 'standard') speak('注意保持躯干正直', 'posture');
  }
}

/**
 * 俯卧撑·躯干笔直度规则
 *
 * 设计：
 *  - 自动选择两侧中关键点可见度更高的一侧（侧面机位优先）
 *  - 用 worldLandmarks（3D，米单位）计算两个夹角：
 *      bodyAngle = ∠(肩, 髋, 踝)        理想 ≈ 180°，标准 ≥ BODY_MIN
 *      neckAngle = ∠(耳, 肩, 髋)        理想 ≈ 180°，标准 ≥ NECK_MIN
 *  - 通过髋点对"肩-踝"直线、耳点对"肩-髋"直线的法向偏移方向，
 *    把不达标进一步细分为：塌腰 / 撅臀 / 头部下垂 / 头部后仰
 *  - 实时语音：连续 BAD_FRAMES_FOR_VOICE 帧偏离即触发 'speak("保持身体笔直")'
 *  - 报告采样：每 SAMPLE_INTERVAL_MS 记录一次帧分类，便于后续给出比例与建议
 *
 * 运动损伤风险关联（用于报告）：
 *  - 塌腰 (hip sag)        ：腰椎过度前凸 + 椎间盘后部受压 → 下腰痛、腰椎间盘风险
 *  - 撅臀 (hip pike)       ：负荷转移到肩前束/三角肌前部，胸大肌训练效果下降；
 *                            长期与肩前撞击综合征 (subacromial impingement) 关联
 *  - 头部下垂              ：颈椎屈曲下颌内收，颈胸交界处张力升高，颈源性头痛
 *  - 头部后仰              ：颈椎过伸，小关节挤压，与颈椎小关节综合征相关
 */
class PushupBodyLine extends FSMRule {
  constructor(cfg) {
    super('pushup_bodyline', 'IDLE');
    this.cfg = cfg;
    this.metrics = this._emptyMetrics();
    this.badFrames = 0;
    this.lastSampleTs = 0;
  }
  _emptyMetrics() {
    return {
      bodyAngle: null,
      neckAngle: null,
      hipDeviation: null,    // null | 'sag' | 'pike'
      headDeviation: null,   // null | 'down' | 'up'
      framesSeen: 0,
      counts: {
        body: { standard: 0, sag: 0, pike: 0 },
        neck: { standard: 0, down: 0, up: 0 },
      },
      samples: [],           // [{ts, bodyAngle, neckAngle, hipDev, headDev}]
    };
  }
  reset() {
    super.reset();
    this.metrics = this._emptyMetrics();
    this.badFrames = 0;
    this.lastSampleTs = 0;
  }

  /** 选择关键点可见度更高的那一侧（左/右）；返回 landmark 索引集 */
  _pickSide(landmarks) {
    const minV = this.cfg.LM_MIN_VISIBILITY;
    const candidates = [
      { S: LM.LEFT_SHOULDER,  H: LM.LEFT_HIP,  A: LM.LEFT_ANKLE,  E: LM.LEFT_EAR  },
      { S: LM.RIGHT_SHOULDER, H: LM.RIGHT_HIP, A: LM.RIGHT_ANKLE, E: LM.RIGHT_EAR },
    ];
    let best = null, bestVis = -1;
    for (const c of candidates) {
      const pts = [c.S, c.H, c.A, c.E].map(i => landmarks[i]);
      if (pts.some(p => !p || (p.visibility ?? 0) < minV)) continue;
      const vis = pts.reduce((s, p) => s + (p.visibility ?? 0), 0);
      if (vis > bestVis) { bestVis = vis; best = c; }
    }
    return best;
  }

  /** 求 P 在直线 A→B 上的投影 y 与 P.y 的差（用于法向偏离判定） */
  _normalOffsetY(A, B, P) {
    const dx = B.x - A.x, dy = B.y - A.y, dz = (B.z ?? 0) - (A.z ?? 0);
    const denom = dx * dx + dy * dy + dz * dz;
    if (denom === 0) return 0;
    const t = ((P.x - A.x) * dx + (P.y - A.y) * dy + ((P.z ?? 0) - (A.z ?? 0)) * dz) / denom;
    const projY = A.y + t * dy;
    return P.y - projY; // y 向下为正：>0 表示 P 比直线低（更靠地面）
  }

  update(landmarks, ts, worldLandmarks) {
    if (!landmarks) {
      this.metrics.bodyAngle = null;
      this.metrics.neckAngle = null;
      this.metrics.hipDeviation = null;
      this.metrics.headDeviation = null;
      this.badFrames = 0;
      return;
    }
    const side = this._pickSide(landmarks);
    if (!side) {
      this.metrics.bodyAngle = null;
      this.metrics.neckAngle = null;
      this.metrics.hipDeviation = null;
      this.metrics.headDeviation = null;
      this.badFrames = 0;
      return;
    }
    // 用 worldLandmarks 算角度更稳健（侧面机位时尤甚）
    const W = worldLandmarks || landmarks;
    const S = W[side.S], H = W[side.H], A = W[side.A], E = W[side.E];
    if (!S || !H || !A || !E) return;

    const bodyAngle = angleDeg(S, H, A);
    const neckAngle = angleDeg(E, S, H);

    // 偏移方向（用 worldLandmarks 同样坐标系，保持一致）
    const hipOff = this._normalOffsetY(S, A, H);  // >0 sag（塌腰）；<0 pike（撅臀）
    const earOff = this._normalOffsetY(S, H, E);  // >0 头下垂；<0 头后仰

    let hipDev = null, headDev = null;
    if (bodyAngle < this.cfg.BODY_MIN) hipDev = hipOff > 0 ? 'sag' : 'pike';
    if (neckAngle < this.cfg.NECK_MIN) headDev = earOff > 0 ? 'down' : 'up';

    this.metrics.bodyAngle = bodyAngle;
    this.metrics.neckAngle = neckAngle;
    this.metrics.hipDeviation = hipDev;
    this.metrics.headDeviation = headDev;

    // 周期性采样
    if (ts - this.lastSampleTs >= this.cfg.SAMPLE_INTERVAL_MS) {
      this.lastSampleTs = ts;
      this.metrics.framesSeen++;
      this.metrics.counts.body[hipDev || 'standard']++;
      this.metrics.counts.neck[headDev || 'standard']++;
      this.metrics.samples.push({ ts, bodyAngle, neckAngle, hipDev, headDev });
    }

    // 实时语音
    if (hipDev || headDev) {
      this.badFrames++;
      if (this.badFrames >= this.cfg.BAD_FRAMES_FOR_VOICE) {
        speak('保持身体笔直', 'pushup_bodyline');
        this.badFrames = 0; // 复位，靠语音 cooldown 控频率
      }
    } else {
      this.badFrames = 0;
    }
  }
}

/**
 * 俯卧撑·肘关节角度规则（rep 计数 + 下沉深度 + 肘锁死评估）
 *
 * 信号：双肘角度 = ∠(肩, 肘, 腕)；以双侧均值驱动 FSM，滞回阈值防抖。
 * 状态机：INIT → UP ↔ DOWN；完成一次 UP→DOWN→UP 视为 1 rep。
 *
 * 每次 rep 结束时评估：
 *   - minElbow（rep 最低肘角）：
 *       ≤ DEPTH_STANDARD(90°)        → 到位
 *       DEPTH_STANDARD..DEPTH_SHALLOW → 勉强（仍计入到位）
 *       > DEPTH_SHALLOW(110°)        → 深度不足 → 语音"下沉再深一些"
 *   - maxElbow（rep 最高肘角）：
 *       > LOCKOUT_THRESHOLD(175°)    → 肘锁死 → 语音"注意肘关节不要锁死"
 *
 * 运动损伤风险：
 *   - 深度不足：胸大肌动程缩短，训练效果打折；易养成代偿习惯
 *   - 肘锁死（lockout）：冲击通过肘鹰嘴直接传递到关节软骨、尺侧副韧带受力，
 *     长期反复与肘关节慢性滑囊炎、鹰嘴应力骨折相关
 */
class PushupElbow extends FSMRule {
  constructor(cfg) {
    super('pushup_elbow', 'INIT');
    this.cfg = cfg;
    this.metrics = this._emptyMetrics();
    this.repStartTs = 0;
    this.lastUpTs = 0;
  }
  _emptyMetrics() {
    return {
      count: 0,
      state: 'INIT',
      currentL: null,
      currentR: null,
      currentAvg: null,
      repMin: null,         // 当前 rep 最低肘角
      repMax: null,         // 当前 rep 最高肘角
      reps: [],             // [{ts, minAngle, maxAngle, depthOk, lockout}]
      depthCounts:   { ok: 0, shallow: 0 },
      lockoutCounts: { ok: 0, locked: 0 },
    };
  }
  reset() {
    super.reset();
    this.metrics = this._emptyMetrics();
    this.repStartTs = 0;
    this.lastUpTs = 0;
  }

  update(landmarks, ts, worldLandmarks) {
    if (!landmarks) { this._resetCurrent(); return; }
    const minV = this.cfg.LM_MIN_VISIBILITY;
    const W = worldLandmarks || landmarks;

    const calcSide = (S, E, Wr) => {
      const ps = landmarks[S], pe = landmarks[E], pw = landmarks[Wr];
      if (!ps || !pe || !pw) return null;
      if ((ps.visibility ?? 0) < minV || (pe.visibility ?? 0) < minV || (pw.visibility ?? 0) < minV) return null;
      const ws = W[S], we = W[E], ww = W[Wr];
      if (!ws || !we || !ww) return null;
      return angleDeg(ws, we, ww);
    };
    const L = calcSide(LM.LEFT_SHOULDER,  LM.LEFT_ELBOW,  LM.LEFT_WRIST);
    const R = calcSide(LM.RIGHT_SHOULDER, LM.RIGHT_ELBOW, LM.RIGHT_WRIST);

    this.metrics.currentL = L;
    this.metrics.currentR = R;
    let avg;
    if (L != null && R != null) avg = (L + R) / 2;
    else avg = L ?? R ?? null;
    this.metrics.currentAvg = avg;
    if (avg == null || isNaN(avg)) { this.metrics.state = this.state; return; }

    // FSM（滞回）
    if (this.state === 'INIT') {
      if (avg > this.cfg.UP_THRESHOLD) {
        this.transition('UP', ts);
        this.lastUpTs = ts;
        this._resetRepExtremes(avg);
      }
    } else if (this.state === 'UP') {
      // 持续更新极值
      this._updateExtremes(avg);
      if (avg < this.cfg.DOWN_THRESHOLD) {
        this.transition('DOWN', ts);
        this.repStartTs = this.lastUpTs;
        this._updateExtremes(avg);
      }
    } else if (this.state === 'DOWN') {
      this._updateExtremes(avg);
      if (avg > this.cfg.UP_THRESHOLD &&
          ts - this.repStartTs >= this.cfg.MIN_REP_MS) {
        // 完成一次 rep：评估并重置极值
        this._finishRep(ts);
        this.transition('UP', ts);
        this.lastUpTs = ts;
        this._resetRepExtremes(avg);
      }
    }
    this.metrics.state = this.state;
  }

  _resetCurrent() {
    this.metrics.currentL = this.metrics.currentR = this.metrics.currentAvg = null;
    this.metrics.state = this.state;
  }
  _resetRepExtremes(avg) {
    this.metrics.repMin = avg;
    this.metrics.repMax = avg;
  }
  _updateExtremes(avg) {
    if (this.metrics.repMin == null || avg < this.metrics.repMin) this.metrics.repMin = avg;
    if (this.metrics.repMax == null || avg > this.metrics.repMax) this.metrics.repMax = avg;
  }
  _finishRep(ts) {
    const minA = this.metrics.repMin;
    const maxA = this.metrics.repMax;
    const depthOk = minA != null && minA <= this.cfg.DEPTH_SHALLOW;
    const locked  = maxA != null && maxA >  this.cfg.LOCKOUT_THRESHOLD;
    this.metrics.count++;
    this.metrics.depthCounts[depthOk ? 'ok' : 'shallow']++;
    this.metrics.lockoutCounts[locked ? 'locked' : 'ok']++;
    this.metrics.reps.push({
      ts, minAngle: minA, maxAngle: maxA, depthOk, lockout: locked,
    });
    // 语音反馈
    if (!depthOk) speak('下沉再深一些', 'pushup_depth');
    if (locked)   speak('注意肘关节，不要锁死', 'pushup_lockout');
  }
}

/** 根据 sport 设置指标面板的 label 文本（仅在切换运动时调用一次） */
function setupMetricLabels(sport) {

    jumprope: ['计数', '状态',       '左膝角度', '右膝角度', '躯干倾角'],
    pushup:   ['完成次数', '肘角 L/R', '躯干角度', '颈部角度', '偏离类型'],

const _devLabel = {
  sag: '塌腰', pike: '撅臀',
  down: '头部下垂', up: '头部后仰',
};

/** 刷新指标面板 UI（读取当前 sport 的规则 metrics） */
function refreshMetricsUI() {
  const sportLabel = { jumprope: '跳绳', pushup: '俯卧撑', squat: '深蹲' };
  document.getElementById('mSport').textContent =
    ruleEngine.sport ? (sportLabel[ruleEngine.sport] || ruleEngine.sport) : '—';

  if (ruleEngine.sport === 'pushup') {
    const bl = ruleEngine.getMetrics('pushup_bodyline');
    const el = ruleEngine.getMetrics('pushup_elbow');
    // 完成次数：肘角规则驱动
    document.getElementById('mCount').textContent = el ? el.count : 0;
    // 肘角 L/R：直接显示双肘角度
    const lStr = (el && el.currentL != null) ? `L ${el.currentL.toFixed(0)}°` : 'L —';
    const rStr = (el && el.currentR != null) ? `R ${el.currentR.toFixed(0)}°` : 'R —';
    document.getElementById('mFsmState').textContent = `${lStr}  ${rStr}`;
    // 躯干角 / 颈部角 / 偏离
    const issues = [];
    if (bl && bl.hipDeviation)  issues.push(_devLabel[bl.hipDeviation]);
    if (bl && bl.headDeviation) issues.push(_devLabel[bl.headDeviation]);
    document.getElementById('mKneeL').textContent =
      (bl && bl.bodyAngle != null) ? bl.bodyAngle.toFixed(0) + '°' : '—';
    document.getElementById('mKneeR').textContent =
      (bl && bl.neckAngle != null) ? bl.neckAngle.toFixed(0) + '°' : '—';
    document.getElementById('mLean').textContent =
      issues.length ? '⚠ ' + issues.join('、') : '✅ 标准';
    return;
  }

  if (ruleEngine.sport === 'jumprope') {
    const c = ruleEngine.getMetrics('jumprope_count') || { count: 0, state: '—', isActive: false };
    document.getElementById('mCount').textContent = c.count;
    // 状态：FSM + 活跃标记（活跃才会真正参与膝角统计）
    const activeTag = c.isActive ? '🟢 活跃' : '⚪ 准备/休息';
    document.getElementById('mFsmState').textContent = `${c.state} · ${activeTag}`;

    const k = ruleEngine.getMetrics('jumprope_knee');
    document.getElementById('mKneeL').textContent =
      (k && k.currentL != null) ? k.currentL.toFixed(0) + '°' : '—';
    document.getElementById('mKneeR').textContent =
      (k && k.currentR != null) ? k.currentR.toFixed(0) + '°' : '—';

    const p = ruleEngine.getMetrics('jumprope_posture');
    document.getElementById('mLean').textContent =
      (p && p.currentLean != null) ? p.currentLean.toFixed(0) + '°' : '—';
  } else {
    document.getElementById('mCount').textContent = '—';
    document.getElementById('mFsmState').textContent = '—';
    document.getElementById('mKneeL').textContent = '—';
    document.getElementById('mKneeR').textContent = '—';
    document.getElementById('mLean').textContent = '—';
  }
}

/**
 * 在 canvas 上叠加规则相关的标注（如膝角文字）。
 * 注意：此函数应在 ctx.restore()（取消摄像头镜像变换）之后调用，
 *       以保证文字方向正确。`mirrored` 用于把 landmark x 取镜像。
 */
function drawAnnotations(landmarks, mirrored) {
  if (!landmarks || ruleEngine.sport !== 'jumprope') return;
  const knee = ruleEngine.getMetrics('jumprope_knee');
  if (!knee) return;
  const cfg = CONFIG.KNEE;
  ctx.save();
  ctx.font = cfg.LABEL_FONT;
  ctx.lineWidth = 4;
  ctx.strokeStyle = cfg.LABEL_STROKE;
  ctx.textBaseline = 'middle';

  const drawAt = (lm, text, leftSide) => {
    if (!lm) return;
    let x = lm.x * canvas.width;
    if (mirrored) x = canvas.width - x;
    const y = lm.y * canvas.height;
    // 文字根据左右膝放在外侧
    const tx = leftSide ? x - 8 : x + 8;
    ctx.textAlign = leftSide ? 'right' : 'left';
    // 颜色：超出标准用红色，标准用绿色
    let color = cfg.LABEL_COLOR;
    const angle = parseFloat(text);
    if (!isNaN(angle)) {
      if (angle < cfg.STANDARD_MIN || angle > cfg.STANDARD_MAX) color = '#FF5252';
      else color = '#69F0AE';
    }
    ctx.fillStyle = color;
    ctx.strokeText(text, tx, y);
    ctx.fillText(text, tx, y);
  };

  // 由于摄像头镜像，画面上"左侧"其实是右膝，反之亦然；
  // 但 landmark 的 LEFT_KNEE 是被检测人的左膝，画面镜像后位置与画面方向一致显示即可
  const lk = landmarks[LM.LEFT_KNEE];
  const rk = landmarks[LM.RIGHT_KNEE];
  if (lk && knee.currentL != null) drawAt(lk, `L:${knee.currentL.toFixed(0)}°`, true);
  if (rk && knee.currentR != null) drawAt(rk, `R:${knee.currentR.toFixed(0)}°`, false);
  ctx.restore();
}

/** 生成报告·躯干姿态评估段（运动损伤科学解释） */
function buildPostureSection() {
  const p = ruleEngine.getMetrics('jumprope_posture');
  if (!p) return '';
  const total = p.samples.length;
  const cfg = CONFIG.POSTURE;
  if (total === 0) {
    return `
      <h3 style="margin-top:14px;">躯干姿态评估</h3>
      <p>未捕捉到落地躯干数据（需肩与髋同时清晰可见）。</p>`;
  }
  const c = p.counts;
  const pct = (n) => ((n / total) * 100).toFixed(1) + '%';
  const sum = p.samples.reduce((s, x) => s + x.lean, 0);
  const avg = (sum / total).toFixed(1);
  const minL = Math.min(...p.samples.map(s => s.lean)).toFixed(1);
  const maxL = Math.max(...p.samples.map(s => s.lean)).toFixed(1);

  const sorted = Object.entries(c).sort((a, b) => b[1] - a[1]);
  const mainCat = sorted[0][0];

  let title, advice, klass;
  if (mainCat === 'standard' && c.standard / total >= 0.6) {
    klass = 'ok';
    title = '✅ 躯干姿态控制良好';
    advice = `多数落地时刻躯干倾角处于 <b>${cfg.STANDARD_MIN}°–${cfg.STANDARD_MAX}°</b>，
      重心位于足前掌正上方，踝-膝-髋形成完整缓冲链；核心肌群（腹横肌、多裂肌、臀中肌）
      工作有效。继续保持，建议训练中搭配 1–2 组核心稳定性训练（死虫、鸟狗）以维持。`;
  } else if (mainCat === 'tooUpright') {
    klass = 'warn';
    title = '⚠ 躯干过于挺直 / 后仰（&lt; ' + cfg.STANDARD_MIN + '°）';
    advice = `躯干接近垂直甚至后仰会让<b>重心后移</b>，落地时常以脚跟先触地，
      地面反作用力直接传至膝关节后方与跟骨，缓冲不足；长期与<b>跟痛症</b>、
      <b>跖筋膜炎</b>、<b>髌腱炎</b>等过劳性损伤相关，并降低跳跃节律稳定性。<br>
      <b>建议：</b>① 主动收紧腹部、轻微前倾躯干，让<b>耳-肩-髋-踝</b>大致连成略前倾直线；
      ② 想象"用前脚掌弹地"，避免脚跟拍地；
      ③ 做髋屈肌（如弓步拉伸）与踝背屈灵活性训练；
      ④ 跳前在原地做几次轻跳找到自然前倾感再开始。`;
  } else if (mainCat === 'overLean') {
    klass = 'bad';
    title = '⚠ 躯干过度倾斜（&gt; ' + cfg.STANDARD_MAX + '°）';
    advice = `躯干过度前倾 / 侧倾说明<b>核心稳定性不足</b>，腰椎承受较大剪切力，
      与<b>非特异性下腰痛 (low back pain)</b>、<b>椎旁肌劳损</b>、<b>腹臀链失衡</b> 相关；
      同时上身代偿动作打乱呼吸节律，导致跳绳易疲劳、容易绊绳。<br>
      <b>建议：</b>① 训练前激活核心（死虫式、平板支撑、鸟狗），并加入臀中肌训练（蚌式、单腿桥）；
      ② 跳绳时刻意"挺胸抬头看前方"，将重心提回到足前掌；
      ③ 控制每组时长，疲劳时立即停下休息——疲劳是姿态崩溃的主要诱因；
      ④ 若伴随腰部酸痛，先停训并评估腰椎-骨盆灵活性。`;
  } else {
    klass = 'warn';
    title = '⚠ 躯干姿态分布偏离标准';
    advice = `多数落地躯干倾角不在 ${cfg.STANDARD_MIN}°–${cfg.STANDARD_MAX}° 范围。
      请结合上方分项次数：偏挺直→刻意前倾、找前脚掌弹地感；偏倾斜→加强核心与臀中肌、控制单次时长。`;
  }

  return `
    <h3 style="margin-top:14px;">躯干姿态评估</h3>
    <p>落地采样：<b>${total}</b>　|　平均躯干倾角：<b>${avg}°</b>　（最小 ${minL}° / 最大 ${maxL}°）</p>
    <ul>
      <li><span class="ok">标准</span>（${cfg.STANDARD_MIN}°–${cfg.STANDARD_MAX}°）：
        ${c.standard} 次（${pct(c.standard)}）</li>
      <li><span class="warn">过于挺直/后仰</span>（&lt; ${cfg.STANDARD_MIN}°）：
        ${c.tooUpright} 次（${pct(c.tooUpright)}）</li>
      <li><span class="bad">过度倾斜</span>（&gt; ${cfg.STANDARD_MAX}°）：
        ${c.overLean} 次（${pct(c.overLean)}）</li>
    </ul>
    <p class="${klass}">${title}</p>
    <p>${advice}</p>
  `;
}

/** 生成俯卧撑·躯干笔直度报告（含运动损伤风险说明） */
function buildPushupReport() {
  const m = ruleEngine.getMetrics('pushup_bodyline');
  if (!m) return '<h3>俯卧撑报告</h3><p>俯卧撑规则未加载。</p>';
  const total = m.framesSeen;
  if (total === 0) {
    return `<h3>俯卧撑评估报告</h3>
      <h4>1) 躯干笔直度</h4>
      <p>未捕捉到躯干线数据。请确保<b>侧面拍摄</b>，画面中能看到<b>耳-肩-髋-踝</b>四个关键点。</p>
      ${buildPushupElbowSection()}`;
  }
  const cfg = CONFIG.PUSHUP_BODYLINE;
  const b = m.counts.body;
  const n = m.counts.neck;
  const pct = (x) => ((x / total) * 100).toFixed(1) + '%';

  // 平均/极值
  const bSum = m.samples.reduce((s, x) => s + (x.bodyAngle || 0), 0);
  const nSum = m.samples.reduce((s, x) => s + (x.neckAngle || 0), 0);
  const bAvg = (bSum / total).toFixed(1);
  const nAvg = (nSum / total).toFixed(1);
  const bMin = Math.min(...m.samples.map(s => s.bodyAngle || Infinity)).toFixed(1);
  const nMin = Math.min(...m.samples.map(s => s.neckAngle || Infinity)).toFixed(1);

  // 各类问题占比
  const sagPct  = b.sag  / total;
  const pikePct = b.pike / total;
  const dnPct   = n.down / total;
  const upPct   = n.up   / total;
  const stdPct  = (b.standard + n.standard) / (total * 2);

  // 整体结论
  let overallTitle, overallClass;
  const badRatio = (b.sag + b.pike + n.down + n.up) / (total * 2);
  if (badRatio < 0.15) {
    overallClass = 'ok';
    overallTitle = '✅ 整体动作质量良好';
  } else if (badRatio < 0.4) {
    overallClass = 'warn';
    overallTitle = '⚠ 部分动作偏离标准，需注意';
  } else {
    overallClass = 'bad';
    overallTitle = '⚠ 动作偏离较多，建议调整训练强度';
  }

  // 各项问题独立给出风险提示
  const issueBlocks = [];
  if (sagPct >= 0.15) {
    issueBlocks.push(`
      <p class="bad">▌塌腰（hip sag）：${b.sag} 帧（${pct(b.sag)}）</p>
      <p>髋关节相对肩-踝直线下沉，腰椎呈过度前凸 (lumbar hyperextension)，
        椎间盘后部与小关节承受额外压力。<b>风险</b>：下腰痛、椎旁肌劳损、
        长期反复可诱发腰椎间盘问题。<br>
        <b>纠正</b>：① 主动收紧腹部并夹臀（"骨盆后倾"）让腰背呈中立位；
        ② 训练前加 1–2 组核心激活（死虫式、平板支撑 30s × 3）；
        ③ 若标准俯卧撑中保持有困难，先做<b>跪姿俯卧撑</b>降低杠杆负荷。</p>`);
  }
  if (pikePct >= 0.15) {
    issueBlocks.push(`
      <p class="warn">▌撅臀（hip pike）：${b.pike} 帧（${pct(b.pike)}）</p>
      <p>髋部上凸使身体呈"倒 V"形，负荷由胸大肌转移到肩前束与三角肌前部，
        胸部训练效果下降。<b>风险</b>：肩前撞击综合征 (subacromial impingement)、
        肩袖肌腱过劳；同时常伴随手腕过度背伸压力。<br>
        <b>纠正</b>：① 想象用胸部贴近地面而不是用屁股发力；
        ② 强化臀大肌（臀桥、单腿桥）以稳定骨盆；
        ③ 适度降低组数避免疲劳性代偿。</p>`);
  }
  if (dnPct >= 0.15) {
    issueBlocks.push(`
      <p class="warn">▌头部下垂（chin tuck/flexion）：${n.down} 帧（${pct(n.down)}）</p>
      <p>颈椎过度屈曲，下颌内收使颈胸交界 (C7-T1) 张力升高。<b>风险</b>：
        颈源性头痛、上斜方肌紧张、长期可加重已有的颈椎间盘问题。<br>
        <b>纠正</b>：眼睛看向身体下方<b>约 30cm 处</b>的地面，
        让头颈与躯干在一条直线（耳垂-肩峰对齐）。</p>`);
  }
  if (upPct >= 0.15) {
    issueBlocks.push(`
      <p class="bad">▌头部后仰（cervical hyperextension）：${n.up} 帧（${pct(n.up)}）</p>
      <p>颈椎过度后伸使颈后小关节 (facet joints) 互相挤压，
        长期与<b>颈椎小关节综合征</b>、椎动脉受压相关。<br>
        <b>纠正</b>：① 取消"抬头看前方"的习惯；
        ② 颈后侧主动延长（"后枕骨向天花板"），下颌微收；
        ③ 配合<b>颈深屈肌</b>训练（仰卧点头练习）。</p>`);
  }

  if (issueBlocks.length === 0) {
    issueBlocks.push(`<p class="ok">未检测到显著偏离动作，继续保持。注意疲劳后期形态崩溃，建议组间充分休息。</p>`);
  }

  return `
    <h3>俯卧撑评估报告</h3>
    <h4 style="margin-top:10px;">1) 躯干笔直度</h4>
    <p>有效采样：<b>${total}</b>　|　
       平均躯干角：<b>${bAvg}°</b>（最低 ${bMin}°，标准 ≥ ${cfg.BODY_MIN}°）　|　
       平均颈部角：<b>${nAvg}°</b>（最低 ${nMin}°，标准 ≥ ${cfg.NECK_MIN}°）</p>
    <ul>
      <li>躯干 — <span class="ok">标准</span>：${b.standard} 帧（${pct(b.standard)}），
        <span class="bad">塌腰</span>：${b.sag} 帧（${pct(b.sag)}），
        <span class="warn">撅臀</span>：${b.pike} 帧（${pct(b.pike)}）</li>
      <li>头颈 — <span class="ok">标准</span>：${n.standard} 帧（${pct(n.standard)}），
        <span class="warn">下垂</span>：${n.down} 帧（${pct(n.down)}），
        <span class="bad">后仰</span>：${n.up} 帧（${pct(n.up)}）</li>
    </ul>
    <p class="${overallClass}">${overallTitle}</p>
    ${issueBlocks.join('\n')}
    ${buildPushupElbowSection()}
    <p class="note">说明：躯干角 = 肩-髋-踝 3D 夹角；颈部角 = 耳-肩-髋 3D 夹角；
      肘角 = 肩-肘-腕 3D 夹角（180° = 手臂完全伸直）。建议侧面拍摄。
      本报告基于俯卧撑动作生物力学共识，仅作训练参考，不构成医学诊断。</p>
  `;
}

/** 俯卧撑·肘关节评估段（rep 计数 + 深度 + 锁死） */
function buildPushupElbowSection() {
  const m = ruleEngine.getMetrics('pushup_elbow');
  if (!m) return '';
  const reps = m.reps.length;
  const cfg = CONFIG.PUSHUP_ELBOW;
  if (reps === 0) {
    return `<h4 style="margin-top:14px;">2) 肘关节评估</h4>
      <p>未捕捉到完整的俯卧撑动作。请确保侧面拍摄且上肢（肩-肘-腕）清晰可见，
         并完成至少一次"上→下→上"的完整动作。</p>`;
  }
  const d = m.depthCounts, lk = m.lockoutCounts;
  const pct = (x) => ((x / reps) * 100).toFixed(1) + '%';
  const mins = m.reps.map(r => r.minAngle).filter(x => x != null);
  const maxs = m.reps.map(r => r.maxAngle).filter(x => x != null);
  const avgMin = (mins.reduce((s, x) => s + x, 0) / mins.length).toFixed(1);
  const avgMax = (maxs.reduce((s, x) => s + x, 0) / maxs.length).toFixed(1);

  const shallowPct = d.shallow / reps;
  const lockedPct  = lk.locked / reps;

  const blocks = [];
  if (shallowPct >= 0.2) {
    blocks.push(`
      <p class="warn">▌下沉深度不足：${d.shallow} / ${reps} 次（${pct(d.shallow)}）</p>
      <p>本次 rep 最低肘角未能降到 <b>${cfg.DEPTH_SHALLOW}°</b> 以下，胸部未接近地面。
        胸大肌在短动程下无法获得充分的<b>离心-向心</b>刺激，训练效果下降；
        同时容易形成代偿，长期可能导致前锯肌、菱形肌激活不足。<br>
        <b>纠正</b>：① 有意识让胸部（而非下巴）先接触地面，或地面上放置一块
        <b>5–8cm 高的海绵/毛巾卷</b>作为下沉目标物；
        ② 若力量不足，先做<b>跪姿俯卧撑</b>或<b>斜面俯卧撑</b>（手撑高于脚），
        在全程完整动作下再逐步降低斜度。</p>`);
  }
  if (lockedPct >= 0.2) {
    blocks.push(`
      <p class="bad">▌肘关节锁死：${lk.locked} / ${reps} 次（${pct(lk.locked)}）</p>
      <p>上位时肘角 > <b>${cfg.LOCKOUT_THRESHOLD}°</b>，手臂完全伸直到关节骨性受限位。
        肘鹰嘴 (olecranon) 直接撞击鹰嘴窝，应力全部转到<b>关节软骨与尺侧副韧带</b>，
        与<b>鹰嘴滑囊炎</b>、<b>鹰嘴应力骨折</b>、肱三头肌止点肌腱病相关；
        同时肌肉离开张力状态，训练有效功下降。<br>
        <b>纠正</b>：① 上位时保持<b>肘关节 5°–10° 微屈</b>，让肱三头肌全程保持张力；
        ② 减少"甩"的节奏，向心阶段控制在 1–2 秒；
        ③ 训练后做三头肌拉伸与肘部环绕活动 10–15 次。</p>`);
  }
  if (blocks.length === 0) {
    blocks.push(`<p class="ok">肘关节深度与上位控制均处于安全区间，继续保持。</p>`);
  }

  return `
    <h4 style="margin-top:14px;">2) 肘关节评估（完成 ${reps} 次）</h4>
    <p>平均下沉肘角：<b>${avgMin}°</b>　|　平均上位肘角：<b>${avgMax}°</b></p>
    <ul>
      <li>深度 — <span class="ok">到位</span>（≤ ${cfg.DEPTH_SHALLOW}°）：${d.ok} 次（${pct(d.ok)}），
        <span class="warn">不足</span>（&gt; ${cfg.DEPTH_SHALLOW}°）：${d.shallow} 次（${pct(d.shallow)}）</li>
      <li>上位 — <span class="ok">正常</span>（≤ ${cfg.LOCKOUT_THRESHOLD}°）：${lk.ok} 次（${pct(lk.ok)}），
        <span class="bad">锁死</span>（&gt; ${cfg.LOCKOUT_THRESHOLD}°）：${lk.locked} 次（${pct(lk.locked)}）</li>
    </ul>
    ${blocks.join('\n')}
  `;
}

/** 生成结束报告（按 sport 路由） */
function generateReport() {
  const reportEl = document.getElementById('report');
  if (ruleEngine.sport === 'pushup') {
    reportEl.style.display = 'block';
    reportEl.innerHTML = buildPushupReport();
    return;
  }
  if (ruleEngine.sport !== 'jumprope') {
    reportEl.style.display = 'block';
    reportEl.innerHTML = '<p>请先选择运动模式并完成一段检测后再生成报告。</p>';
    return;
  }
  const counter = ruleEngine.getMetrics('jumprope_count') || { count: 0 };
  const knee    = ruleEngine.getMetrics('jumprope_knee');
  const total   = knee ? knee.samples.length : 0;

  if (total === 0) {
    reportEl.style.display = 'block';
    reportEl.innerHTML =
      '<h3>跳绳报告</h3><p>未捕捉到落地膝角数据。请确保画面中能看到完整下肢（髋-膝-踝），' +
      '并完成至少一次落地后再生成报告。</p>' + buildPostureSection();
    return;
  }

  const c   = knee.counts;
  const pct = (n) => ((n / total) * 100).toFixed(1) + '%';
  const sum = knee.samples.reduce((s, x) => s + x.angle, 0);
  const avg = (sum / total).toFixed(1);
  const minA = Math.min(...knee.samples.map(s => s.angle)).toFixed(1);
  const maxA = Math.max(...knee.samples.map(s => s.angle)).toFixed(1);

  // 主导档位
  const sorted = Object.entries(c).sort((a, b) => b[1] - a[1]);
  const mainCat = sorted[0][0];

  // 结论 + 运动损伤科学解释
  let title, advice, klass;
  if (mainCat === 'standard' && c.standard / total >= 0.6) {
    klass = 'ok';
    title = '✅ 落地缓冲表现良好';
    advice = `多数落地膝角处于 <b>${CONFIG.KNEE.STANDARD_MIN}°–${CONFIG.KNEE.STANDARD_MAX}°</b> 的安全区间。
      在此范围内，膝关节通过股四头肌、臀大肌的<b>离心收缩</b>有效吸收着地冲击，地面反作用力被
      髋-膝-踝多关节链共同分担，膑股关节压强与胫骨纵向冲击均处于较低水平。
      建议保持现有落地策略；连续训练 30 分钟左右安排短休息，避免疲劳累积导致缓冲质量下降。`;
  } else if (mainCat === 'overFlexion') {
    klass = 'warn';
    title = '⚠ 落地屈曲过大（&lt; ' + CONFIG.KNEE.STANDARD_MIN + '°）';
    advice = `屈曲幅度过大会显著抬高<b>膑股关节接触压强 (patellofemoral joint stress)</b>，
      长期反复负荷与<b>髌股疼痛综合征 (PFPS)</b>、<b>髌腱炎 (jumper's knee)</b> 高度相关；
      同时股四头肌离心负荷上升，膝前与大腿前侧肌肉酸痛、拉伤风险增加。<br>
      <b>建议：</b>① 训练前激活臀大肌与核心（臀桥、蚌式、平板支撑）以分担落地负荷；
      ② 强化"轻落地"意识——前脚掌先着地，膝关节<b>微屈缓冲</b>即可，不必深蹲式着地；
      ③ 控制单次跳绳时长，分组进行；④ 训练后冰敷与拉伸股四头肌、髂胫束。`;
  } else if (mainCat === 'overExtension') {
    klass = 'bad';
    title = '⚠ 落地过伸（&gt; ' + CONFIG.KNEE.STANDARD_MAX + '°）';
    advice = `膝关节几乎完全伸直状态下接受冲击，缓冲机制基本失效，地面反作用力沿胫骨纵向上传，
      与<b>胫骨骨膜炎 (shin splints)</b>、<b>半月板冲击伤</b>、<b>胫骨/跖骨应力性骨折</b>
      等慢性损伤相关；过伸还会让交叉韧带处于不利负荷角度。<br>
      <b>建议：</b>① 主动降低重心，落地时<b>有意识屈膝 20°–30°</b>；
      ② 强化小腿三头肌与足底内在肌（提踵、足趾抓毛巾、平衡板训练）；
      ③ 选择缓冲良好的运动鞋与稍具弹性的场地（避免水泥地直接落地）；
      ④ 若已有膝、胫前疼痛，先停训并就诊评估。`;
  } else {
    klass = 'warn';
    title = '⚠ 落地角度分布偏离标准';
    advice = `多数落地膝角不在 ${CONFIG.KNEE.STANDARD_MIN}°–${CONFIG.KNEE.STANDARD_MAX}° 范围内，
      建议结合上方分项数据分别针对屈曲过大与过伸的次数采取相应调整：
      屈曲过大→减小下蹲幅度、注重轻落地；过伸→主动屈膝缓冲、加强小腿力量。`;
  }

  reportEl.style.display = 'block';
  reportEl.innerHTML = `
    <h3>跳绳膝关节落地缓冲报告</h3>
    <p>总跳跃次数：<b>${counter.count}</b>　|　落地采样：<b>${total}</b>　|　
       平均落地膝角：<b>${avg}°</b>　（最小 ${minA}° / 最大 ${maxA}°）</p>
    <ul>
      <li><span class="ok">标准</span>（${CONFIG.KNEE.STANDARD_MIN}°–${CONFIG.KNEE.STANDARD_MAX}°）：
        ${c.standard} 次（${pct(c.standard)}）</li>
      <li><span class="warn">屈曲过大</span>（&lt; ${CONFIG.KNEE.STANDARD_MIN}°）：
        ${c.overFlexion} 次（${pct(c.overFlexion)}）</li>
      <li><span class="bad">过伸</span>（&gt; ${CONFIG.KNEE.STANDARD_MAX}°）：
        ${c.overExtension} 次（${pct(c.overExtension)}）</li>
    </ul>
    <p class="${klass}">${title}</p>
    <p>${advice}</p>
    ${buildPostureSection()}
    <p class="note">说明：膝角 = 髋-膝-踝三点 3D 夹角（180° = 完全伸直）；
      躯干倾角 = 髋中点→肩中点向量与竖直方向的 3D 夹角。
      所有采样仅在"活跃跳绳"期记录。本报告基于膝关节落地缓冲与核心控制的运动生物力学共识，
      仅作训练参考，不构成医学诊断。</p>
  `;
}

/* ============================================================
 *  摄像头模式
 * ============================================================ */
async function startCamera() {
  await stopAll();
  mode = 'camera';
  setStatus('正在启动摄像头...', 'idle');
  initPose();

  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: {
        width:  { ideal: CONFIG.CAMERA_WIDTH },
        height: { ideal: CONFIG.CAMERA_HEIGHT },
        facingMode: 'user',
      },
      audio: false,
    });
    videoEl.srcObject = cameraStream;
    await videoEl.play();

    const vw = videoEl.videoWidth  || CONFIG.CAMERA_WIDTH;
    const vh = videoEl.videoHeight || CONFIG.CAMERA_HEIGHT;
    fitCanvasTo(vw, vh);
    showPlaceholder(false);
    lastLandmarks = null;

    setStatus('实时检测中', 'live');
    btnStop.disabled  = false;
    btnPlay.disabled  = true;
    btnPause.disabled = true;

    // ---- 渲染循环：每个 rAF 都把当前摄像头帧画到 canvas，并叠加最近一次骨架 ----
    // 摄像头做水平镜像（前置自拍更自然）
    const renderLoop = () => {
      if (mode !== 'camera') return;
      if (videoEl.readyState >= 2) {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
        if (lastLandmarks) drawSkeleton(lastLandmarks);
        ctx.restore();
        // 文字标注（不受镜像变换影响）
        if (lastLandmarks) drawAnnotations(lastLandmarks, true);
      }
      videoRafId = requestAnimationFrame(renderLoop);
    };
    videoRafId = requestAnimationFrame(renderLoop);

    // ---- 推理循环：串行调用 pose.send，互不重入；按目标帧率间隔触发 ----
    const inferTick = async () => {
      if (mode !== 'camera') return;
      if (!inferring && videoEl.readyState >= 2) {
        inferring = true;
        try {
          await pose.send({ image: videoEl });
        } catch (e) {
          console.warn('pose.send error', e);
        } finally {
          inferring = false;
        }
      }
      inferTimerId = setTimeout(inferTick, MIN_FRAME_INTERVAL);
    };
    inferTimerId = setTimeout(inferTick, 0);
  } catch (err) {
    console.error(err);
    setStatus('摄像头启动失败：' + err.message, 'idle');
    await stopAll();
  }
}

/* ============================================================
 *  视频上传模式
 * ============================================================ */
async function startVideoFromFile(file) {
  await stopAll();
  mode = 'video';
  setStatus('加载视频中...', 'idle');
  initPose();

  const url = URL.createObjectURL(file);
  videoEl.srcObject = null;
  videoEl.src = url;
  videoEl.loop = false;
  videoEl.muted = true;

  await new Promise((resolve, reject) => {
    videoEl.onloadedmetadata = () => resolve();
    videoEl.onerror = () => reject(new Error('视频加载失败'));
  });

  // 按视频原始比例适配 Canvas
  fitCanvasTo(videoEl.videoWidth, videoEl.videoHeight);
  showPlaceholder(false);

  await videoEl.play().catch(() => {});

  btnStop.disabled  = false;
  btnPlay.disabled  = false;
  btnPause.disabled = false;
  setStatus('视频分析中', 'ok');
  lastLandmarks = null;

  // ---- 渲染循环：每个 rAF 都把当前视频帧画到 canvas，并叠加最近一次骨架 ----
  // 这样画面始终跟随视频流畅播放，不会被推理阻塞
  const renderLoop = () => {
    if (mode !== 'video') return;
    if (videoEl.readyState >= 2) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
      if (lastLandmarks) drawSkeleton(lastLandmarks);
      if (lastLandmarks) drawAnnotations(lastLandmarks, false);
    }
    if (videoEl.ended) setStatus('视频播放结束', 'ok');
    videoRafId = requestAnimationFrame(renderLoop);
  };
  videoRafId = requestAnimationFrame(renderLoop);

  // ---- 推理循环：串行调用 pose.send，互不重入；按目标帧率间隔触发 ----
  const inferTick = async () => {
    if (mode !== 'video') return;
    if (!inferring && !videoEl.paused && !videoEl.ended && videoEl.readyState >= 2) {
      inferring = true;
      try {
        await pose.send({ image: videoEl });
      } catch (e) {
        console.warn('pose.send error', e);
      } finally {
        inferring = false;
      }
    }
    inferTimerId = setTimeout(inferTick, MIN_FRAME_INTERVAL);
  };
  inferTimerId = setTimeout(inferTick, 0);
}

/* ============================================================
 *  停止所有任务
 * ============================================================ */
async function stopAll() {
  // 先置 idle，让所有循环下一 tick 退出
  mode = 'idle';
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  if (videoRafId) {
    cancelAnimationFrame(videoRafId);
    videoRafId = null;
  }
  if (inferTimerId) {
    clearTimeout(inferTimerId);
    inferTimerId = null;
  }
  inferring = false;
  lastLandmarks = null;
  if (videoEl) {
    try { videoEl.pause(); } catch (_) {}
    if (videoEl.src) {
      URL.revokeObjectURL(videoEl.src);
      videoEl.removeAttribute('src');
      videoEl.load();
    }
    videoEl.srcObject = null;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  showPlaceholder(true);

  mode = 'idle';
  btnStop.disabled  = true;
  btnPlay.disabled  = true;
  btnPause.disabled = true;
  setStatus('空闲', 'idle');
}

/* ============================================================
 *  事件绑定
 * ============================================================ */
btnCamera.addEventListener('click', startCamera);

btnUpload.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  const file = e.target.files && e.target.files[0];
  if (file) startVideoFromFile(file);
  fileInput.value = ''; // 允许再次选择同一文件
});

btnStop.addEventListener('click', stopAll);

btnPlay.addEventListener('click', () => {
  if (mode === 'video') videoEl.play();
});
btnPause.addEventListener('click', () => {
  if (mode === 'video') videoEl.pause();
});

// 运动模式选择按钮：切换规则引擎运动类型，并重置计数
document.querySelectorAll('[data-sport]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-sport]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const sport = btn.getAttribute('data-sport');
    console.log('[运动模式] 已切换到：', sport);
    ruleEngine.setSport(sport);
    setupMetricLabels(sport);
    // 切换运动时清空报告
    const r = document.getElementById('report');
    r.style.display = 'none';
    r.innerHTML = '';
    refreshMetricsUI();
  });
});

// 重置计数按钮（同时清空报告 & 语音冷却）
document.getElementById('btnResetCount').addEventListener('click', () => {
  ruleEngine.resetCurrent();
  resetVoiceCooldown();
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  const r = document.getElementById('report');
  r.style.display = 'none';
  r.innerHTML = '';
  refreshMetricsUI();
});

// 语音提醒开关
const chkVoice = document.getElementById('chkVoice');
chkVoice.checked = CONFIG.VOICE.ENABLED;
chkVoice.addEventListener('change', () => {
  CONFIG.VOICE.ENABLED = chkVoice.checked;
  if (!chkVoice.checked && window.speechSynthesis) window.speechSynthesis.cancel();
});

/* 🔊 测试语音按钮
 *  - 在 click 事件同步栈中（标准 user activation）调 speak，最大化解锁成功率
 *  - 即使开关关闭也允许测试
 *  - 根据浏览器能力直接更新 hint 行，让用户在手机上也能看到诊断结果
 */
document.getElementById('btnVoiceTest').addEventListener('click', () => {
  const hint = document.getElementById('voiceHint');
  if (!('speechSynthesis' in window)) {
    hint.innerHTML = '❌ 当前浏览器不支持语音合成（speechSynthesis）。' +
      '请改用系统自带的 <b>Safari (iOS)</b> 或 <b>Chrome (Android)</b> 打开本页。';
    hint.style.color = '#ff6b6b';
    return;
  }
  unlockVoice();
  try {
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();
    const u = new SpeechSynthesisUtterance('语音测试，注意保持躯干正直');
    u.lang   = CONFIG.VOICE.LANG;
    u.rate   = CONFIG.VOICE.RATE;
    u.pitch  = CONFIG.VOICE.PITCH;
    u.volume = CONFIG.VOICE.VOLUME;
    let spoke = false;
    u.onstart = () => { spoke = true; };
    u.onerror = (e) => {
      hint.innerHTML = '⚠ 语音播放出错：' + (e.error || '未知错误') +
        '。请检查手机静音开关与媒体音量。';
      hint.style.color = '#f59e0b';
    };
    window.speechSynthesis.speak(u);
    _utterPool.push(u);
    // 1.2 秒后若仍未触发 onstart → 多半是被静音/拦截
    setTimeout(() => {
      if (!spoke) {
        hint.innerHTML = '⚠ 看起来没有播放出声音。' +
          '常见原因：① iPhone <b>侧边静音开关</b>处于静音；' +
          '② 媒体音量为 0；③ 当前是微信/QQ/钉钉等内置浏览器（不支持 TTS）。' +
          '请检查后再试。';
        hint.style.color = '#f59e0b';
      } else {
        hint.innerHTML = '✅ 语音可用，运动中将自动提醒。';
        hint.style.color = '#10b981';
      }
    }, 1200);
  } catch (e) {
    hint.innerHTML = '❌ 调用失败：' + e.message;
    hint.style.color = '#ff6b6b';
  }
});

// 生成报告按钮
document.getElementById('btnReport').addEventListener('click', () => {
  generateReport();
  document.getElementById('report').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
});

// 初始状态
setStatus('空闲', 'idle');
showPlaceholder(true);
refreshMetricsUI();
</script>
