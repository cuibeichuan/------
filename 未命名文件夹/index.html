<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>AI Coach · 实时人体姿态检测</title>

<!-- ================== MediaPipe Pose CDN (UMD via jsdelivr) ================== -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<style>
  /* ================== 全局基础样式 ================== */
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: #0f1116;
    color: #e6e8ee;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
  }

  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  header h1 {
    margin: 0 0 4px 0;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  header p {
    margin: 0;
    font-size: 13px;
    color: #9aa3b2;
  }

  /* ================== 按钮组 ================== */
  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .btn {
    /* 移动端友好：最小 44x44 */
    min-height: 44px;
    min-width: 44px;
    padding: 10px 16px;
    border: none;
    border-radius: 10px;
    background: #2a2f3a;
    color: #e6e8ee;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
    user-select: none;
  }
  .btn:hover { background: #353c4a; }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: #3b82f6; }
  .btn.primary:hover { background: #4d8ffb; }
  .btn.success { background: #10b981; }
  .btn.success:hover { background: #20c896; }
  .btn.warning { background: #f59e0b; color: #1a1a1a; }
  .btn.warning:hover { background: #ffb12a; }
  .btn.active { outline: 2px solid #60a5fa; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .section-title {
    font-size: 13px;
    color: #9aa3b2;
    margin: 6px 0 -4px 2px;
    letter-spacing: 0.4px;
  }

  /* ================== 画布容器（保持比例，避免黑边/变形） ================== */
  .canvas-wrap {
    position: relative;
    width: 100%;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    aspect-ratio: 4 / 3; /* 现代浏览器：运行时 JS 会覆盖为实际视频比例 */
  }
  /* 兜底：老版 iOS Safari 不支持 aspect-ratio 时用 padding-top */
  @supports not (aspect-ratio: 1 / 1) {
    .canvas-wrap::before { content: ""; display: block; padding-top: 75%; }
  }
  .canvas-wrap canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
  }
  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6b7280;
    font-size: 14px;
    text-align: center;
    padding: 16px;
    pointer-events: none;
  }

  /* 状态条 */
  .status {
    font-size: 13px;
    color: #9aa3b2;
    background: #1a1d24;
    padding: 8px 12px;
    border-radius: 8px;
    min-height: 36px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #6b7280;
  }
  .dot.live { background: #ef4444; animation: blink 1s infinite; }
  .dot.ok { background: #10b981; }
  @keyframes blink { 50% { opacity: 0.3; } }

  /* 隐藏文件选择器 */
  input[type="file"].hidden-input { display: none; }
  /* 视频元素离屏（不能用 display:none，否则部分浏览器会节流/暂停播放） */
  video.hidden-input {
    position: fixed;
    left: -9999px;
    top: 0;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  /* ================== 响应式 ================== */
  @media (max-width: 600px) {
    header h1 { font-size: 18px; }
    .btn { font-size: 14px; padding: 10px 14px; }
    .app { padding: 12px; gap: 10px; }
  }
</style>
</head>

<body>
<div class="app">
  <header>
    <h1>AI Coach · 实时人体姿态检测</h1>
    <p>基于 MediaPipe Pose · 摄像头实时检测 / 视频上传分析</p>
    <p id="httpsTip" style="display:none;color:#f59e0b;font-size:12px;margin-top:6px;">
      ⚠ 当前非 HTTPS / localhost，浏览器将禁止使用摄像头。请通过 https 或 http://localhost 访问。
    </p>
  </header>

  <!-- 模式入口 -->
  <div class="section-title">输入源</div>
  <div class="btn-row">
    <button class="btn primary" id="btnCamera">📷 开始实时检测</button>
    <button class="btn primary" id="btnUpload">🎞️ 上传视频分析</button>
    <button class="btn" id="btnStop" disabled>⏹ 停止</button>
  </div>

  <!-- 视频播放控制（仅视频模式可用） -->
  <div class="section-title">视频控制</div>
  <div class="btn-row">
    <button class="btn success" id="btnPlay" disabled>▶ 播放</button>
    <button class="btn warning" id="btnPause" disabled>⏸ 暂停</button>
  </div>

  <!-- 运动模式选择 -->
  <div class="section-title">运动模式</div>
  <div class="btn-row">
    <button class="btn" data-sport="jumprope">🪢 跳绳</button>
    <button class="btn" data-sport="pushup">💪 俯卧撑</button>
    <button class="btn" data-sport="squat">🏋️ 深蹲</button>
  </div>

  <!-- 画布显示区 -->
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="output"></canvas>
    <div class="placeholder" id="placeholder">点击上方按钮开启摄像头或上传视频</div>
  </div>

  <!-- 状态显示 -->
  <div class="status" id="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">空闲</span>
  </div>

  <!-- 隐藏的输入元素 -->
  <input type="file" id="fileInput" class="hidden-input" accept="video/*" />
  <video id="videoEl" class="hidden-input" playsinline muted></video>
</div>

<script>
/* ============================================================
 *  顶部配置项（方便修改）
 * ============================================================ */
const CONFIG = {
  // 关键点颜色（圆圈）
  KEYPOINT_COLOR: '#00E5FF',
  KEYPOINT_RADIUS: 4,

  // 连线颜色与粗细
  CONNECTION_COLOR: '#FF4081',
  CONNECTION_WIDTH: 3,

  // 检测阈值（可见度低于此值不绘制）
  VISIBILITY_THRESHOLD: 0.5,

  // 摄像头分辨率限制（性能优化）
  CAMERA_WIDTH: 640,
  CAMERA_HEIGHT: 480,

  // 帧率上限（fps），避免过度推理
  TARGET_FPS: 30,

  // MediaPipe Pose 选项
  POSE_OPTIONS: {
    modelComplexity: 1,         // 0/1/2，越高越精准但越慢
    smoothLandmarks: true,
    enableSegmentation: false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
  },
};

/* ============================================================
 *  DOM 引用
 * ============================================================ */
const canvas       = document.getElementById('output');
const ctx          = canvas.getContext('2d');
const canvasWrap   = document.getElementById('canvasWrap');
const placeholder  = document.getElementById('placeholder');
const statusText   = document.getElementById('statusText');
const statusDot    = document.getElementById('statusDot');

const btnCamera = document.getElementById('btnCamera');
const btnUpload = document.getElementById('btnUpload');
const btnStop   = document.getElementById('btnStop');
const btnPlay   = document.getElementById('btnPlay');
const btnPause  = document.getElementById('btnPause');

const fileInput = document.getElementById('fileInput');
const videoEl   = document.getElementById('videoEl');

/* ============================================================
 *  全局状态
 * ============================================================ */
let pose = null;            // MediaPipe Pose 实例
let mode = 'idle';          // 'idle' | 'camera' | 'video'
let cameraStream = null;    // getUserMedia 返回的流
let videoRafId = null;      // 视频模式渲染 rAF id
let inferTimerId = null;    // 视频模式推理定时器
let inferring = false;      // 推理是否进行中（防重入）
let lastLandmarks = null;   // 最近一次姿态结果（用于叠加绘制）
let lastFrameTime = 0;      // 摄像头模式帧率限制
const MIN_FRAME_INTERVAL = 1000 / CONFIG.TARGET_FPS;

/* ============================================================
 *  辅助：状态显示与占位
 * ============================================================ */
function setStatus(text, type = 'idle') {
  statusText.textContent = text;
  statusDot.className = 'dot' + (type === 'live' ? ' live' : type === 'ok' ? ' ok' : '');
}
function showPlaceholder(show) {
  placeholder.style.display = show ? 'flex' : 'none';
}

/* ============================================================
 *  画布尺寸适配（保持原始比例）
 * ============================================================ */
function fitCanvasTo(width, height) {
  canvas.width = width;
  canvas.height = height;
  // 容器跟随视频比例，避免黑边/变形
  canvasWrap.style.aspectRatio = `${width} / ${height}`;
}

/* ============================================================
 *  MediaPipe Pose 初始化
 *  注：Pose 内部使用 WebGL/WASM；这里通过设置 GL context preferences
 *  以及不启用 segmentation 来确保走 WebGL 后端，性能最优
 * ============================================================ */
function initPose() {
  if (pose) return pose;

  pose = new Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`,
  });

  pose.setOptions(CONFIG.POSE_OPTIONS);
  pose.onResults(onPoseResults);
  return pose;
}

/* ============================================================
 *  推理结果回调：绘制图像 + 骨架
 * ============================================================ */
function onPoseResults(results) {
  // 摄像头/视频模式统一：只缓存关键点，渲染循环负责画
  lastLandmarks = results.poseLandmarks || null;
}

/* ============================================================
 *  骨架绘制（关键点圆圈 + 连线）
 * ============================================================ */
function drawSkeleton(landmarks) {
  const w = canvas.width;
  const h = canvas.height;

  // 优先使用 MediaPipe drawing_utils（视觉效果一致）
  if (typeof drawConnectors === 'function' && typeof drawLandmarks === 'function'
      && typeof POSE_CONNECTIONS !== 'undefined') {
    drawConnectors(ctx, landmarks, POSE_CONNECTIONS, {
      color: CONFIG.CONNECTION_COLOR,
      lineWidth: CONFIG.CONNECTION_WIDTH,
    });
    drawLandmarks(ctx, landmarks, {
      color: CONFIG.KEYPOINT_COLOR,
      lineWidth: 1,
      radius: CONFIG.KEYPOINT_RADIUS,
      fillColor: CONFIG.KEYPOINT_COLOR,
    });
    return;
  }

  // 兜底：手动绘制
  ctx.strokeStyle = CONFIG.CONNECTION_COLOR;
  ctx.lineWidth = CONFIG.CONNECTION_WIDTH;
  const connections = (typeof POSE_CONNECTIONS !== 'undefined') ? POSE_CONNECTIONS : [];
  for (const [a, b] of connections) {
    const la = landmarks[a], lb = landmarks[b];
    if (!la || !lb) continue;
    if ((la.visibility ?? 1) < CONFIG.VISIBILITY_THRESHOLD) continue;
    if ((lb.visibility ?? 1) < CONFIG.VISIBILITY_THRESHOLD) continue;
    ctx.beginPath();
    ctx.moveTo(la.x * w, la.y * h);
    ctx.lineTo(lb.x * w, lb.y * h);
    ctx.stroke();
  }
  ctx.fillStyle = CONFIG.KEYPOINT_COLOR;
  for (const lm of landmarks) {
    if ((lm.visibility ?? 1) < CONFIG.VISIBILITY_THRESHOLD) continue;
    ctx.beginPath();
    ctx.arc(lm.x * w, lm.y * h, CONFIG.KEYPOINT_RADIUS, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* ============================================================
 *  摄像头模式
 * ============================================================ */
async function startCamera() {
  await stopAll();
  mode = 'camera';
  setStatus('正在启动摄像头...', 'idle');

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setStatus('当前环境不支持摄像头（需 HTTPS 或 localhost）', 'idle');
    mode = 'idle';
    return;
  }

  initPose();

  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: {
        width:  { ideal: CONFIG.CAMERA_WIDTH },
        height: { ideal: CONFIG.CAMERA_HEIGHT },
        facingMode: 'user',
      },
      audio: false,
    });
    videoEl.srcObject = cameraStream;
    await videoEl.play();

    const vw = videoEl.videoWidth  || CONFIG.CAMERA_WIDTH;
    const vh = videoEl.videoHeight || CONFIG.CAMERA_HEIGHT;
    fitCanvasTo(vw, vh);
    showPlaceholder(false);
    lastLandmarks = null;

    setStatus('实时检测中', 'live');
    btnStop.disabled  = false;
    btnPlay.disabled  = true;
    btnPause.disabled = true;

    // ---- 渲染循环：每个 rAF 都把当前摄像头帧画到 canvas，并叠加最近一次骨架 ----
    // 摄像头做水平镜像（前置自拍更自然）
    const renderLoop = () => {
      if (mode !== 'camera') return;
      if (videoEl.readyState >= 2) {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
        if (lastLandmarks) drawSkeleton(lastLandmarks);
        ctx.restore();
      }
      videoRafId = requestAnimationFrame(renderLoop);
    };
    videoRafId = requestAnimationFrame(renderLoop);

    // ---- 推理循环：串行调用 pose.send，互不重入 ----
    const inferTick = async () => {
      if (mode !== 'camera') return;
      if (!inferring && videoEl.readyState >= 2) {
        inferring = true;
        try {
          await pose.send({ image: videoEl });
        } catch (e) {
          console.warn('pose.send error', e);
        } finally {
          inferring = false;
        }
      }
      inferTimerId = setTimeout(inferTick, MIN_FRAME_INTERVAL);
    };
    inferTimerId = setTimeout(inferTick, 0);
  } catch (err) {
    console.error(err);
    setStatus('摄像头启动失败：' + (err.message || err.name), 'idle');
    await stopAll();
  }
}

/* ============================================================
 *  视频上传模式
 * ============================================================ */
async function startVideoFromFile(file) {
  await stopAll();
  mode = 'video';
  setStatus('加载视频中...', 'idle');
  initPose();

  const url = URL.createObjectURL(file);
  videoEl.srcObject = null;
  videoEl.src = url;
  videoEl.loop = false;
  videoEl.muted = true;

  await new Promise((resolve, reject) => {
    videoEl.onloadedmetadata = () => resolve();
    videoEl.onerror = () => reject(new Error('视频加载失败'));
  });

  // 按视频原始比例适配 Canvas
  fitCanvasTo(videoEl.videoWidth, videoEl.videoHeight);
  showPlaceholder(false);

  await videoEl.play().catch(() => {});

  btnStop.disabled  = false;
  btnPlay.disabled  = false;
  btnPause.disabled = false;
  setStatus('视频分析中', 'ok');
  lastLandmarks = null;

  // ---- 渲染循环：每个 rAF 都把当前视频帧画到 canvas，并叠加最近一次骨架 ----
  // 这样画面始终跟随视频流畅播放，不会被推理阻塞
  const renderLoop = () => {
    if (mode !== 'video') return;
    if (videoEl.readyState >= 2) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
      if (lastLandmarks) drawSkeleton(lastLandmarks);
    }
    if (videoEl.ended) setStatus('视频播放结束', 'ok');
    videoRafId = requestAnimationFrame(renderLoop);
  };
  videoRafId = requestAnimationFrame(renderLoop);

  // ---- 推理循环：串行调用 pose.send，互不重入；按目标帧率间隔触发 ----
  const inferTick = async () => {
    if (mode !== 'video') return;
    if (!inferring && !videoEl.paused && !videoEl.ended && videoEl.readyState >= 2) {
      inferring = true;
      try {
        await pose.send({ image: videoEl });
      } catch (e) {
        console.warn('pose.send error', e);
      } finally {
        inferring = false;
      }
    }
    inferTimerId = setTimeout(inferTick, MIN_FRAME_INTERVAL);
  };
  inferTimerId = setTimeout(inferTick, 0);
}

/* ============================================================
 *  停止所有任务
 * ============================================================ */
async function stopAll() {
  // 先把 mode 置 idle，让循环立即退出
  mode = 'idle';

  if (videoRafId) {
    cancelAnimationFrame(videoRafId);
    videoRafId = null;
  }
  if (inferTimerId) {
    clearTimeout(inferTimerId);
    inferTimerId = null;
  }
  // 等待正在进行的推理结束，避免与下次 pose.close 竞争
  for (let i = 0; i < 20 && inferring; i++) {
    await new Promise(r => setTimeout(r, 25));
  }
  inferring = false;
  lastLandmarks = null;

  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  if (videoEl) {
    try { videoEl.pause(); } catch (_) {}
    if (videoEl.src) {
      URL.revokeObjectURL(videoEl.src);
      videoEl.removeAttribute('src');
      videoEl.load();
    }
    videoEl.srcObject = null;
  }

  // 关键：销毁 Pose 实例，下次重新创建。否则 WebGL/WASM 状态可能污染
  if (pose) {
    try { await pose.close(); } catch (_) {}
    pose = null;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  showPlaceholder(true);

  btnStop.disabled  = true;
  btnPlay.disabled  = true;
  btnPause.disabled = true;
  setStatus('空闲', 'idle');
}

/* ============================================================
 *  事件绑定
 * ============================================================ */
btnCamera.addEventListener('click', startCamera);

btnUpload.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  const file = e.target.files && e.target.files[0];
  if (file) startVideoFromFile(file);
  fileInput.value = ''; // 允许再次选择同一文件
});

btnStop.addEventListener('click', stopAll);

btnPlay.addEventListener('click', () => {
  if (mode === 'video') videoEl.play();
});
btnPause.addEventListener('click', () => {
  if (mode === 'video') videoEl.pause();
});

// 运动模式选择按钮（暂时仅 console.log）
document.querySelectorAll('[data-sport]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-sport]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const sport = btn.getAttribute('data-sport');
    console.log('[运动模式] 已切换到：', sport);
  });
});

// 初始状态
setStatus('空闲', 'idle');
showPlaceholder(true);

// 非安全上下文（非 HTTPS 且非 localhost）下提示用户
(function checkSecureContext() {
  const isLocal = ['localhost', '127.0.0.1', ''].includes(location.hostname);
  if (!window.isSecureContext && !isLocal) {
    document.getElementById('httpsTip').style.display = 'block';
  }
})();

// 检测 Pose SDK 是否成功加载（CDN 失败时给出明确提示）
window.addEventListener('load', () => {
  if (typeof Pose === 'undefined') {
    setStatus('MediaPipe Pose 加载失败（请检查网络/CDN）', 'idle');
  }
});
</script>
</body>
</html>
